<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLOG 自动化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      color: #333;
      font-size: 14px;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* 左侧导航 */
    .sidebar {
      width: 200px;
      background: #f5f5f5;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #ddd;
      background: #fff;
    }

    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px 0;
    }

    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.3s;
      color: #666;
      font-size: 14px;
    }

    .nav-item:hover {
      background: #efefef;
      color: #333;
    }

    .nav-item.active {
      background: #e8e8e8;
      border-left-color: #333;
      color: #333;
      font-weight: 500;
    }

    .sidebar-footer {
      padding: 15px 20px;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    .btn-back {
      width: 100%;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.3s;
    }

    .btn-back:hover {
      background: #555;
    }

    /* 右侧内容 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      padding: 20px;
      border-bottom: 1px solid #ddd;
      background: #fff;
    }

    .main-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* 标签页 */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab-btn:hover {
      color: #333;
    }

    .tab-btn.active {
      color: #333;
      border-bottom-color: #333;
      font-weight: 500;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #333;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
    }

    /* 按钮 */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #333;
      color: white;
    }

    .btn-primary:hover {
      background: #555;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    /* 统计卡片 */
    .stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #333;
    }

    /* 表格 */
    .table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }

    .table th {
      background: #f5f5f5;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #ddd;
      color: #333;
    }

    .table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .table tr:hover {
      background: #fafafa;
    }

    /* 加载状态 */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 消息提示 */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 15px 20px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左侧导航 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>BLOG 自动化</h2>
      </div>

      <div class="sidebar-nav">
        <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 仪表盘</div>
        <div class="nav-item" data-tab="keywords" onclick="switchTab('keywords')">🔑 关键词库</div>
        <div class="nav-item" data-tab="plan" onclick="switchTab('plan')">📅 生成规划</div>
        <div class="nav-item" data-tab="list" onclick="switchTab('list')">📝 计划列表</div>
      </div>

      <div class="sidebar-footer">
        <button class="btn-back" onclick="goBackToCRM()">← 返回 CRM</button>
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="main">
      <div class="main-header">
        <h1 id="pageTitle">仪表盘</h1>
      </div>

      <div class="main-content">
        <!-- 标签页 1：仪表盘 -->
        <div class="tab-content active" id="dashboard-tab">
          <div class="stats-cards">
            <div class="stat-card">
              <div class="stat-label">总计划</div>
              <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">已生成</div>
              <div class="stat-value" id="statGenerated">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">待审核</div>
              <div class="stat-value" id="statPending">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">已发布</div>
              <div class="stat-value" id="statPublished">0</div>
            </div>
          </div>

          <div class="form-group">
            <label>最近运行记录</label>
            <div id="lastRunRecord" style="padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; color: #666;">加载中...</div>
          </div>

          <div class="button-group">
            <button class="btn btn-primary" onclick="generateNow()">📝 立即生成</button>
            <button class="btn btn-secondary" onclick="loadDashboard()">🔄 刷新</button>
          </div>
        </div>

        <!-- 标签页 2：关键词库 -->
        <div class="tab-content" id="keywords-tab">
          <div class="form-group">
            <label>添加关键词</label>
            <div style="display: flex; gap: 10px;">
              <input type="text" id="keywordInput" placeholder="输入关键词">
              <button class="btn btn-primary" onclick="addKeyword()">添加</button>
            </div>
          </div>

          <table class="table">
            <thead>
              <tr>
                <th>关键词</th>
                <th>分类</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="keywordTableBody">
              <tr><td colspan="3" style="text-align: center; color: #999;">加载中...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- 标签页 3：生成规划 -->
        <div class="tab-content" id="plan-tab">
          <div class="form-group">
            <label>规划月份</label>
            <input type="month" id="planMonth" value="2026-06">
          </div>

          <div class="form-group">
            <label>每天生成数量</label>
            <select id="dailyCount">
              <option value="1">每天 1 篇</option>
              <option value="2">每天 2 篇</option>
              <option value="4" selected>每天 4 篇</option>
            </select>
          </div>

          <button class="btn btn-primary" onclick="generatePlan()">生成 30 天规划</button>
        </div>

        <!-- 标签页 4：计划列表 -->
        <div class="tab-content" id="list-tab">
          <table class="table">
            <thead>
              <tr>
                <th>日期</th>
                <th>关键词</th>
                <th>标题</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="planTableBody">
              <tr><td colspan="5" style="text-align: center; color: #999;">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 获取认证 token
    function getToken() {
      return localStorage.getItem('crm_token');
    }

    // 获取 API 请求头
    function getHeaders() {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json' };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      return headers;
    }

    // 显示提示信息
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // 切换标签页
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`${tabName}-tab`).classList.add('active');
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

      const titles = {
        dashboard: '仪表盘',
        keywords: '关键词库',
        plan: '生成规划',
        list: '计划列表'
      };
      document.getElementById('pageTitle').textContent = titles[tabName];

      if (tabName === 'dashboard') loadDashboard();
      else if (tabName === 'keywords') loadKeywords();
      else if (tabName === 'list') loadPlans();
    }

    // 返回 CRM
    function goBackToCRM() {
      window.location.href = '/dashboard.html';
    }

    // 加载仪表盘
    async function loadDashboard() {
      try {
        const response = await fetch('/api/blog/dashboard', {
          headers: getHeaders()
        });
        const data = await response.json();

        if (data.success) {
          document.getElementById('statTotal').textContent = data.todayStats?.total || 0;
          document.getElementById('statGenerated').textContent = data.todayStats?.generated || 0;
          document.getElementById('statPending').textContent = data.todayStats?.pending_review || 0;
          document.getElementById('statPublished').textContent = data.todayStats?.published || 0;
          document.getElementById('lastRunRecord').innerHTML = '暂无记录';
        }
      } catch (error) {
        showToast('加载失败：' + error.message);
      }
    }

    // 加载关键词
    async function loadKeywords() {
      try {
        const response = await fetch('/api/blog/keywords', {
          headers: getHeaders()
        });
        const data = await response.json();

        if (data.success) {
          const tbody = document.getElementById('keywordTableBody');
          tbody.innerHTML = (data.keywords || []).map(kw => `
            <tr>
              <td>${kw.keyword}</td>
              <td>${kw.category || '-'}</td>
              <td><button class="btn btn-secondary" onclick="deleteKeyword('${kw.id}')">删除</button></td>
            </tr>
          `).join('') || '<tr><td colspan="3" style="text-align: center; color: #999;">暂无关键词</td></tr>';
        }
      } catch (error) {
        showToast('加载失败：' + error.message);
      }
    }

    // 添加关键词
    async function addKeyword() {
      const input = document.getElementById('keywordInput');
      if (!input.value.trim()) {
        showToast('请输入关键词');
        return;
      }

      try {
        const response = await fetch('/api/blog/keywords', {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ keyword: input.value.trim() })
        });
        const data = await response.json();

        if (data.success) {
          showToast('✅ 关键词已添加');
          input.value = '';
          loadKeywords();
        } else {
          showToast('❌ ' + data.error);
        }
      } catch (error) {
        showToast('错误：' + error.message);
      }
    }

    // 生成规划
    async function generatePlan() {
      const month = document.getElementById('planMonth').value;
      const dailyCount = parseInt(document.getElementById('dailyCount').value);

      try {
        const response = await fetch('/api/blog/generate-plan', {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ month, dailyCount })
        });
        const data = await response.json();

        if (data.success) {
          showToast(`✅ 规划已生成！共 ${data.totalPlans} 篇`);
          loadPlans();
        } else {
          showToast('❌ ' + data.error);
        }
      } catch (error) {
        showToast('错误：' + error.message);
      }
    }

    // 加载计划列表
    async function loadPlans() {
      try {
        const response = await fetch('/api/blog/plans', {
          headers: getHeaders()
        });
        const data = await response.json();

        if (data.success) {
          const tbody = document.getElementById('planTableBody');
          tbody.innerHTML = (data.plans || []).map(plan => `
            <tr>
              <td>${plan.date || '-'}</td>
              <td>${plan.keyword || '-'}</td>
              <td>${plan.title || '-'}</td>
              <td>${plan.status || '-'}</td>
              <td><button class="btn btn-secondary" onclick="editPlan('${plan.id}')">编辑</button></td>
            </tr>
          `).join('') || '<tr><td colspan="5" style="text-align: center; color: #999;">暂无计划</td></tr>';
        }
      } catch (error) {
        showToast('加载失败：' + error.message);
      }
    }

    // 立即生成
    async function generateNow() {
      try {
        const response = await fetch('/api/blog/generate-content', {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({})
        });
        const data = await response.json();

        if (data.success) {
          showToast('✅ 文章已生成');
          loadDashboard();
        } else {
          showToast('❌ ' + data.error);
        }
      } catch (error) {
        showToast('错误：' + error.message);
      }
    }

    // 编辑计划
    function editPlan(planId) {
      showToast('编辑功能开发中...');
    }

    // 删除关键词
    async function deleteKeyword(keywordId) {
      if (!confirm('确定删除？')) return;

      try {
        const response = await fetch(`/api/blog/keywords/${keywordId}`, {
          method: 'DELETE',
          headers: getHeaders()
        });
        const data = await response.json();

        if (data.success) {
          showToast('✅ 已删除');
          loadKeywords();
        } else {
          showToast('❌ ' + data.error);
        }
      } catch (error) {
        showToast('错误：' + error.message);
      }
    }

    // 页面加载时初始化
    window.addEventListener('load', () => {
      loadDashboard();
    });
  </script>
</body>
</html>
