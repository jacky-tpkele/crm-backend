<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TPKELE — Sign In</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;overflow:hidden;}

.page{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;
}

/* ── Brand ── */
.brand-wrap{display:flex;align-items:center;gap:12px;margin-bottom:2px;}
.brand-title{font-size:22px;font-weight:700;letter-spacing:4px;color:#fff;text-transform:uppercase;}
.sub-title{font-size:18px;font-weight:300;letter-spacing:2px;color:rgba(180,210,230,0.65);margin-bottom:20px;}

/* ── Card ── */
.card{
  display:flex;
  background:rgba(4,10,28,0.92);
  border:1px solid rgba(0,200,255,0.18);
  border-radius:8px;
  overflow:hidden;
  width:min(800px,97vw);
  box-shadow:0 0 60px rgba(0,160,220,0.07),0 0 120px rgba(0,80,130,0.05);
  backdrop-filter:blur(12px);
}

/* ── Fingerprint Panel ── */
.fp-panel{
  flex-shrink:0;width:286px;
  display:flex;align-items:center;justify-content:center;
  padding:40px 28px;
  position:relative;
}

.fp-outer{
  width:216px;height:216px;
  border-radius:50%;
  border:2px solid rgba(0,220,255,0.65);
  box-shadow:0 0 22px rgba(0,220,255,0.45),0 0 50px rgba(0,180,220,0.18),inset 0 0 22px rgba(0,220,255,0.07);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
/* Spinning arc */
.fp-outer::before{
  content:'';
  position:absolute;inset:-4px;
  border-radius:50%;
  border:4px solid rgba(0,200,255,0.06);
  border-top:4px solid rgba(0,229,255,0.85);
  border-right:4px solid rgba(0,229,255,0.35);
  animation:spin 4s linear infinite;
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.fp-inner{
  width:168px;height:168px;
  border-radius:50%;
  background:rgba(0,4,14,0.96);
  border:1px solid rgba(0,200,255,0.15);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  z-index:1;
}

/* Scan line */
.fp-scan{
  position:absolute;
  left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,229,255,0.65) 50%,transparent 100%);
  animation:scan 3s ease-in-out infinite;
  pointer-events:none;
  z-index:2;
}
@keyframes scan{
  0%{top:10%;opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{top:88%;opacity:0;}
}

.fp-svg{width:106px;height:106px;animation:fp-pulse 3s ease-in-out infinite;}
@keyframes fp-pulse{0%,100%{opacity:0.75;}50%{opacity:1;}}

/* ── Login Panel ── */
.login-panel{
  flex:1;
  padding:40px 30px;
  border-left:1px solid rgba(0,200,255,0.1);
  display:flex;flex-direction:column;
  justify-content:center;
}

/* Floating label fields */
.field{position:relative;margin-bottom:26px;}
.field label{
  position:absolute;left:0;top:13px;
  font-size:13px;color:rgba(255,255,255,0.38);
  transition:.2s ease;pointer-events:none;
}
.field input{
  width:100%;background:none;
  border:none;border-bottom:1px solid rgba(255,255,255,0.16);
  padding:12px 0 6px;
  font-size:14px;color:#fff;
  font-family:inherit;outline:none;
  transition:.2s;
}
.field input:focus{border-bottom-color:#00e5ff;}
.field input:focus ~ label,
.field input:not(:placeholder-shown) ~ label{
  top:-7px;font-size:10.5px;color:#00c8f0;
}

.err{color:#f87171;font-size:11.5px;min-height:14px;margin-bottom:8px;text-align:center;}

.login-btn{
  width:100%;padding:11px;
  background:linear-gradient(90deg,#005f90,#008fba);
  border:1px solid rgba(0,200,255,0.38);
  border-radius:4px;
  color:#fff;font-size:14px;font-weight:600;
  font-family:inherit;cursor:pointer;letter-spacing:.5px;
  box-shadow:0 3px 18px rgba(0,150,195,0.28);
  transition:.2s;
}
.login-btn:hover{
  background:linear-gradient(90deg,#007ab8,#00aad8);
  box-shadow:0 4px 24px rgba(0,210,255,0.42);
}
.login-btn:active{transform:translateY(1px);}
.login-btn:disabled{opacity:.48;cursor:not-allowed;transform:none;}

/* ── Footer ── */
.status-bar{
  margin-top:9px;
  font-size:11px;color:rgba(255,255,255,0.28);
  text-align:center;letter-spacing:.3px;
}
.status-online{color:#00e5ff;}
.status-offline{color:#f87171;}

.bottom-row{
  display:flex;align-items:center;
  width:min(800px,97vw);
  margin-top:7px;padding:0 2px;
}
.lang-select{
  padding:5px 12px;
  background:rgba(0,200,255,0.06);
  border:1px solid rgba(0,200,255,0.2);
  border-radius:4px;color:#c8d8e8;
  font-size:11.5px;font-family:inherit;
  cursor:pointer;outline:none;
}
.lang-select option{background:#060f22;}
.legal-link{
  margin-left:auto;
  font-size:11px;color:rgba(255,255,255,0.28);
  text-decoration:none;
}
.legal-link:hover{color:rgba(255,255,255,0.55);}

@media(max-width:600px){
  .fp-panel{display:none;}
  html,body{overflow:auto;}
  .page{padding:12px;}
}
</style>
</head>
<body>

<div class="page">

  <!-- Brand -->
  <div class="brand-wrap">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <polygon points="22,2 42,12 42,32 22,42 2,32 2,12"
        stroke="rgba(0,220,255,0.55)" stroke-width="1.2" fill="rgba(0,200,255,0.04)"/>
      <polygon points="22,8 36,16 36,28 22,36 8,28 8,16"
        stroke="rgba(0,220,255,0.22)" stroke-width="0.7" fill="none"/>
      <line x1="13" y1="16" x2="31" y2="16" stroke="#00e5ff" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="22" y1="16" x2="22" y2="31" stroke="#00e5ff" stroke-width="2.6" stroke-linecap="round"/>
    </svg>
    <span class="brand-title">TPKELE</span>
  </div>

  <div class="card">

    <!-- Fingerprint panel -->
    <div class="fp-panel">
      <div class="fp-outer">
        <div class="fp-inner">
          <div class="fp-scan"></div>
          <svg class="fp-svg" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="fg" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.2" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <g filter="url(#fg)" stroke="#00e5ff" stroke-linecap="round">
              <circle cx="55" cy="55" r="2.8" fill="#00e5ff" stroke="none"/>
              <ellipse cx="55" cy="55" rx="7"  ry="5.5"  stroke-width="1.4" stroke-dasharray="10 3 7 3"  stroke-dashoffset="0"/>
              <ellipse cx="55" cy="55" rx="13" ry="10"   stroke-width="1.4" stroke-dasharray="15 4 9 4"  stroke-dashoffset="3"/>
              <ellipse cx="55" cy="55" rx="19" ry="15"   stroke-width="1.4" stroke-dasharray="22 5 11 5" stroke-dashoffset="5"/>
              <ellipse cx="55" cy="55" rx="25" ry="20.5" stroke-width="1.4" stroke-dasharray="30 6 14 6" stroke-dashoffset="7"/>
              <ellipse cx="55" cy="55" rx="31" ry="26"   stroke-width="1.4" stroke-dasharray="38 7 16 7" stroke-dashoffset="9"/>
              <ellipse cx="55" cy="55" rx="37" ry="31"   stroke-width="1.4" stroke-dasharray="47 8 18 8" stroke-dashoffset="11"/>
              <ellipse cx="55" cy="55" rx="43" ry="36"   stroke-width="1.4" stroke-dasharray="56 9 20 9" stroke-dashoffset="13"/>
              <ellipse cx="55" cy="55" rx="49" ry="41"   stroke-width="1.4" stroke-dasharray="65 10 22 10" stroke-dashoffset="15"/>
              <ellipse cx="55" cy="55" rx="53" ry="46"   stroke-width="1.4" stroke-dasharray="73 11 24 11" stroke-dashoffset="17"/>
            </g>
          </svg>
        </div>
      </div>
    </div>

    <!-- Login panel -->
    <div class="login-panel">
      <form id="loginForm" onsubmit="doLogin(event)">
        <div class="field">
          <input type="text" id="inp-account" placeholder=" " required autocomplete="username"/>
          <label id="lbl-a">Username</label>
        </div>
        <div class="field">
          <input type="password" id="inp-pw" placeholder=" " required autocomplete="current-password"/>
          <label id="lbl-p">Password</label>
        </div>

        <div class="err" id="errMsg"></div>

        <button type="submit" class="login-btn" id="signBtn">
          <span id="lbl-btn">Login</span>
        </button>
      </form>
    </div>

  </div>

  <div class="status-bar">
    Status: <span id="s-dot" class="status-offline">offline</span>
    &nbsp;|&nbsp;IP: <span id="s-ip">--</span>
    &nbsp;|&nbsp;MAC: <span id="s-mac">--</span>
  </div>

  <div class="bottom-row">
    <select class="lang-select" id="langSel" onchange="setLang(this.value)">
      <option value="en">English</option>
      <option value="zh">中文</option>
    </select>
    <a href="#" class="legal-link">Legal Notice</a>
  </div>

</div>

<script>
/* ── i18n ── */
const T = {
  en: { a:'Username', p:'Password', btn:'Login',   loading:'Signing in...',
        ef:'Please enter credentials', er:'Invalid account or password' },
  zh: { a:'账号',    p:'密码',     btn:'登 录', loading:'登录中...',
        ef:'请填写账号和密码',        er:'账号或密码错误' }
};
let cl = localStorage.getItem('crm_lang') || 'en';

function setLang(l) {
  cl = l;
  localStorage.setItem('crm_lang', l);
  document.getElementById('langSel').value = l;
  document.getElementById('lbl-a').textContent = T[l].a;
  document.getElementById('lbl-p').textContent = T[l].p;
  document.getElementById('lbl-btn').textContent = T[l].btn;
}
async function doLogin(e) {
  e.preventDefault();
  const account = document.getElementById('inp-account').value.trim();
  const pw      = document.getElementById('inp-pw').value;
  const btn     = document.getElementById('signBtn');
  const err     = document.getElementById('errMsg');
  if (!account || !pw) { err.textContent = T[cl].ef; return; }
  err.textContent = '';
  btn.disabled = true;
  document.getElementById('lbl-btn').textContent = T[cl].loading;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: account, password: pw })
    });
    const data = await res.json();
    if (!res.ok || !data.token) throw new Error(data.message || T[cl].er);
    localStorage.setItem('crm_token', data.token);
    if (data.username) localStorage.setItem('crm_username', data.username);
    location.href = '/dashboard.html';
  } catch (ex) {
    err.textContent = ex.message || T[cl].er;
    btn.disabled = false;
    document.getElementById('lbl-btn').textContent = T[cl].btn;
  }
}

setLang(cl);
if (localStorage.getItem('crm_token')) location.href = '/dashboard.html';
</script>
</body>
</html>
