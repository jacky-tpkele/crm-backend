<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPKELE CRM - 邮件</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000509;--panel:#060f20;--panel2:#0a1628;
  --border:rgba(0,190,255,0.12);--border-h:rgba(0,220,255,0.38);
  --text:#ddf0ff;--muted:#4d7390;--muted2:#7aa4c0;
  --primary:#00c8f0;--primary-dim:rgba(0,200,240,0.08);
  --danger:#fb7185;--success:#4ade80;
  --shadow:0 20px 60px rgba(0,0,0,.7);--radius:14px;--sb:220px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.15);border-radius:4px}

.app{display:flex;height:100vh;overflow:hidden}

/* ── CRM Sidebar ── */
.sidebar{width:var(--sb);flex-shrink:0;height:100%;background:linear-gradient(180deg,rgba(3,8,20,.99),rgba(2,5,13,.99));border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:20}
.sb-logo{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-icon{width:36px;height:36px;flex-shrink:0;display:grid;place-items:center}
.logo-text{font-size:15px;font-weight:700;white-space:nowrap;letter-spacing:1px}
.logo-text span{color:var(--primary)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:.15s;white-space:nowrap;color:var(--muted2);font-size:13.5px;font-weight:500;border-left:3px solid transparent}
.nav-item:hover{background:rgba(0,200,255,0.05);color:var(--text)}
.nav-item.active{background:rgba(0,200,240,0.08);color:var(--primary);border-left-color:var(--primary)}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-group{padding:8px 16px 4px;font-size:10px;font-weight:600;color:rgba(0,200,255,.22);text-transform:uppercase;letter-spacing:.8px}

/* ── Email layout ── */
.email-shell{flex:1;display:flex;overflow:hidden}

/* ── Folder panel ── */
.folder-panel{width:185px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel)}
.folder-header{padding:14px;border-bottom:1px solid var(--border);flex-shrink:0}
.btn-compose{width:100%;padding:9px 14px;border-radius:8px;border:none;background:var(--primary);color:#000;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn-compose:hover{background:#00e5ff}

.folder-list{padding:8px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.folder-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--muted2);transition:.15s;border-radius:6px;margin:1px 6px;border-left:3px solid transparent}
.folder-item:hover{background:rgba(0,200,255,.06);color:var(--text)}
.folder-item.active{background:rgba(0,200,240,.1);color:var(--primary);border-left-color:var(--primary)}
.folder-item .badge{margin-left:auto;background:var(--primary);color:#000;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

/* ── Accounts section ── */
.acct-section{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.acct-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;font-size:10px;font-weight:600;color:rgba(0,200,255,.22);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}
.btn-add-acct{width:18px;height:18px;border-radius:4px;border:1px solid rgba(0,200,255,.2);background:transparent;color:var(--muted2);cursor:pointer;font-size:15px;display:grid;place-items:center;line-height:1;transition:.15s}
.btn-add-acct:hover{border-color:var(--primary);color:var(--primary)}
.acct-list{flex:1;overflow-y:auto;padding:2px 0}
.acct-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12.5px;color:var(--muted2);transition:.15s;border-left:3px solid transparent}
.acct-item:hover{background:rgba(0,200,255,.04);color:var(--text)}
.acct-item.active{background:rgba(0,200,240,.08);color:var(--primary);border-left-color:var(--primary)}
.acct-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.acct-item.active .acct-dot{background:var(--primary)}
.acct-email{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.btn-edit-acct{width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;display:none;place-items:center;transition:.15s;flex-shrink:0}
.acct-item:hover .btn-edit-acct{display:grid}
.btn-edit-acct:hover{color:var(--primary)}
.acct-empty{padding:8px 14px;font-size:12px;color:var(--muted);font-style:italic}

.folder-sync{padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0}
.btn-sync{width:100%;padding:7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s}
.btn-sync:hover{border-color:var(--primary);color:var(--primary)}
.btn-sync.syncing{opacity:.6;pointer-events:none}

/* ── Email list ── */
.list-panel{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel)}
.list-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.list-title{font-size:14px;font-weight:600}
.list-count{font-size:11px;color:var(--muted)}
.list-body{flex:1;overflow-y:auto}
.email-item{padding:12px 16px;border-bottom:1px solid rgba(0,190,255,.06);cursor:pointer;transition:.15s}
.email-item:hover{background:rgba(0,200,255,.04)}
.email-item.active{background:rgba(0,200,240,.08);border-left:3px solid var(--primary)}
.email-item.unread .ei-subject{font-weight:600;color:var(--text)}
.email-item.unread .ei-from{color:var(--primary)}
.ei-from{font-size:12.5px;font-weight:500;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-subject{font-size:12.5px;color:var(--muted2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-date{font-size:11px;color:var(--muted);margin-top:4px}
.unread-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);display:inline-block;margin-right:6px;flex-shrink:0}
.ei-row{display:flex;align-items:center}
.list-empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px}
.list-loading{padding:30px;text-align:center;color:var(--muted);font-size:13px}

/* ── Detail / Compose ── */
.detail-panel{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
.detail-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px}
.detail-placeholder svg{opacity:.25}

.reader{flex:1;display:flex;flex-direction:column;overflow:hidden}
.reader-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.reader-subject{font-size:18px;font-weight:600;margin-bottom:10px}
.reader-meta{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:12.5px;color:var(--muted2)}
.reader-meta strong{color:var(--text)}
.reader-actions{display:flex;gap:8px;margin-top:14px}
.btn-action{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.2s}
.btn-action:hover{border-color:var(--primary);color:var(--primary)}
.btn-action.danger:hover{border-color:var(--danger);color:var(--danger)}
.reader-body{flex:1;overflow-y:auto;padding:20px 24px}
.reader-html{color:var(--text);font-size:14px;line-height:1.7;max-width:720px}
.reader-html a{color:var(--primary)}
.reader-html img{max-width:100%}
.reader-text{white-space:pre-wrap;font-size:13.5px;line-height:1.8;color:var(--muted2);max-width:720px}

.compose{flex:1;display:flex;flex-direction:column;overflow:hidden}
.compose-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.compose-title{font-size:14px;font-weight:600}
.btn-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.15s}
.btn-close:hover{border-color:var(--danger);color:var(--danger)}
.compose-form{flex:1;display:flex;flex-direction:column;padding:16px 24px;gap:10px;overflow-y:auto}
.field-row{display:flex;align-items:center;border-bottom:1px solid var(--border);padding-bottom:8px}
.field-label{font-size:12px;color:var(--muted);width:50px;flex-shrink:0}
.field-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;padding:2px 0}
.field-input::placeholder{color:var(--muted)}
.compose-editor{flex:1;display:flex;flex-direction:column;min-height:0}
.compose-footer{padding:12px 24px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.btn-send{padding:8px 22px;border-radius:7px;border:none;background:var(--primary);color:#000;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.btn-send:hover{background:#00e5ff}
.btn-send:disabled{opacity:.5;pointer-events:none}
.send-status{font-size:12px;color:var(--muted)}
.send-status.ok{color:var(--success)}
.send-status.err{color:var(--danger)}

.attach-area{border:1px dashed var(--border);border-radius:8px;padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:40px;flex-shrink:0}
.attach-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;font-size:12px;transition:.2s;flex-shrink:0}
.attach-btn:hover{border-color:var(--primary);color:var(--primary)}
.table-tools{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;flex-shrink:0}
.table-tool-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(0,200,255,.04);color:var(--muted2);cursor:pointer;font-size:12px;transition:.2s}
.table-tool-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(0,200,255,.1)}
.attach-chip{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11.5px;color:var(--muted2)}
.attach-chip .rm{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;transition:.15s}
.attach-chip .rm:hover{color:var(--danger)}

/* ── Quill dark theme ── */
.ql-toolbar.ql-snow{background:var(--panel2);border-color:var(--border)!important;border-radius:8px 8px 0 0;flex-shrink:0}
.ql-container.ql-snow{border-color:var(--border)!important;border-radius:0 0 8px 8px;color:#111;flex:1;min-height:160px;display:flex;flex-direction:column;background:#fff}
.ql-editor{flex:1;color:#111;background:#fff;font-size:13.5px;line-height:1.8}
.ql-editor.ql-blank::before{color:#8b96a3;font-style:normal}
.ql-snow .ql-stroke{stroke:var(--muted2)}
.ql-snow .ql-fill{fill:var(--muted2)}
.ql-snow .ql-picker{color:var(--muted2)}
.ql-snow .ql-picker-options{background:var(--panel2);border-color:var(--border)!important}
.ql-snow .ql-picker-item{color:var(--text)}
.ql-snow .ql-toolbar button:hover .ql-stroke,.ql-snow .ql-toolbar button.ql-active .ql-stroke{stroke:var(--primary)}
.ql-snow .ql-toolbar button:hover .ql-fill,.ql-snow .ql-toolbar button.ql-active .ql-fill{fill:var(--primary)}
.ql-snow .ql-toolbar button:hover,.ql-snow .ql-toolbar button.ql-active{color:var(--primary)}
.ql-snow .ql-picker-label:hover,.ql-snow .ql-picker.ql-expanded .ql-picker-label{color:var(--primary)!important}
.ql-snow .ql-picker.ql-expanded .ql-picker-label .ql-stroke{stroke:var(--primary)!important}
.ql-editor a{color:#0b63ce}

/* ── Account Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:none;place-items:center}
.modal-overlay.open{display:grid}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:520px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 90px;gap:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11.5px;color:var(--muted2)}
.form-label .req{color:var(--danger)}
.form-ctrl{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:.15s;width:100%}
.form-ctrl:focus{border-color:var(--primary)}
.form-ctrl::placeholder{color:var(--muted)}
.form-hint{font-size:11px;color:var(--muted);margin-top:2px}
.btn-modal-cancel{padding:7px 18px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;font-size:13px;transition:.15s}
.btn-modal-cancel:hover{border-color:var(--border-h);color:var(--text)}
.btn-modal-save{padding:7px 22px;border-radius:7px;border:none;background:var(--primary);color:#000;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-modal-save:hover{background:#00e5ff}
.btn-modal-delete{padding:7px 16px;border-radius:7px;border:1px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer;font-size:13px;margin-right:auto;transition:.15s}
.btn-modal-delete:hover{background:rgba(251,113,133,.1)}
.modal-status{font-size:12px;margin-left:4px}
.modal-status.err{color:var(--danger)}
.modal-status.ok{color:var(--success)}

/* ── Multi-select ── */
.bulk-bar{display:none;align-items:center;gap:10px;padding:8px 16px;background:rgba(0,200,240,.07);border-bottom:1px solid var(--border);flex-shrink:0}
.bulk-bar.show{display:flex}
.bulk-count{font-size:12px;color:var(--primary);font-weight:600}
.btn-bulk-del{padding:4px 12px;border-radius:6px;border:1px solid rgba(251,113,133,.4);background:rgba(251,113,133,.08);color:var(--danger);font-size:12px;cursor:pointer;transition:.2s}
.btn-bulk-del:hover{background:rgba(251,113,133,.2)}
.btn-bulk-cancel{margin-left:auto;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:12px;cursor:pointer;transition:.2s}
.btn-bulk-cancel:hover{color:var(--text)}
.sel-all-wrap{display:flex;align-items:center}
.sel-all-check{width:14px;height:14px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.ei-check{width:14px;height:14px;flex-shrink:0;cursor:pointer;accent-color:var(--primary);opacity:0;transition:opacity .15s;margin-right:2px}
.email-item:hover .ei-check,.email-item.selected .ei-check{opacity:1}
.email-item.selected{background:rgba(0,200,240,.06)}

/* ── Fullscreen compose ── */
.detail-panel.fullscreen{position:fixed;inset:0;z-index:200}
.btn-fs{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.15s;flex-shrink:0}
.btn-fs:hover{border-color:rgba(0,200,255,.4);color:var(--primary)}

/* ── Table insert dialog ── */
.tbl-dlg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);display:none;flex-direction:column;gap:14px;min-width:220px}
.tbl-dlg.open{display:flex}
.tbl-dlg-title{font-size:14px;font-weight:600}
.tbl-row{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px;color:var(--muted2)}
.tbl-num{width:70px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:15px;outline:none;text-align:center;font-weight:600}
.tbl-num:focus{border-color:var(--primary)}
.tbl-dlg-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-tbl-ok{padding:6px 18px;border-radius:7px;border:none;background:var(--primary);color:#000;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-tbl-ok:hover{background:#00e5ff}
.btn-tbl-cancel{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:13px;cursor:pointer;transition:.15s}
.btn-tbl-cancel:hover{color:var(--text)}
.tbl-dlg-overlay{position:fixed;inset:0;z-index:499;display:none}
.tbl-dlg-overlay.open{display:block}

/* ── Table styles in editor & reader ── */
.reader-html table,.ql-editor table{border-collapse:collapse;width:auto;margin:10px 0;font-size:13px;border:1px solid #222}
.reader-html th,.reader-html td,.ql-editor th,.ql-editor td{border:1px solid #222;padding:8px 12px;min-width:80px;vertical-align:top}
.reader-html td,.ql-editor td{background:#fff;color:#111}
.reader-html th,.ql-editor th{background:#f1f3f5;font-weight:700;color:#111}
.ql-editor td p,.ql-editor th p{margin:0}
.ql-editor table.is-striped tbody tr:nth-child(even) td{background:#f7f7f7}
.ql-editor table.active-table{outline:2px solid rgba(0,200,255,.35);outline-offset:2px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);display:none;align-items:center;gap:10px;box-shadow:var(--shadow)}
.toast.show{display:flex}
.toast.ok{border-color:rgba(74,222,128,.35)}
.toast.err{border-color:rgba(251,113,133,.35)}
</style>
</head>
<body>
<div class="app">

  <!-- CRM Sidebar -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="9" fill="rgba(0,200,240,0.12)"/>
          <path d="M8 18h20M18 8v20" stroke="#00c8f0" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="4" fill="#00c8f0"/>
        </svg>
      </div>
      <div class="logo-text">TP<span>KELE</span></div>
    </div>
    <div class="sb-nav">
      <div class="nav-group">主菜单</div>
      <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon">📊</span><span>仪表盘</span></div>
      <div class="nav-item" onclick="location.href='index.html'"><span class="nav-icon">📦</span><span>订单管理</span></div>
      <div class="nav-item" onclick="location.href='index.html#customers'"><span class="nav-icon">👥</span><span>客户管理</span></div>
      <div class="nav-group">工具</div>
      <div class="nav-item active"><span class="nav-icon">✉️</span><span>邮件</span></div>
    </div>
  </div>

  <!-- Email Shell -->
  <div class="email-shell">

    <!-- Folder Panel -->
    <div class="folder-panel">
      <div class="folder-header">
        <button class="btn-compose" onclick="openCompose()">✏️ 写邮件</button>
      </div>

      <div class="folder-list">
        <div class="folder-item active" onclick="selectFolder('INBOX',this)">
          <span>📥</span><span>收件箱</span>
          <span class="badge" id="badge-inbox" style="display:none"></span>
        </div>
        <div class="folder-item" onclick="selectFolder('SENT',this)">
          <span>📤</span><span>已发送</span>
        </div>
      </div>

      <div class="acct-section">
        <div class="acct-hd">
          <span>邮箱账号</span>
          <button class="btn-add-acct" onclick="openAccountModal()" title="添加邮箱">＋</button>
        </div>
        <div class="acct-list" id="acctList">

        </div>

      <div class="folder-sync">
        <button class="btn-sync" id="btnSync" onclick="syncEmails()">
          <span id="syncIcon">🔄</span> 同步收件箱
        </button>
      </div>
    </div>

    <!-- Email List -->
    <div class="list-panel">
      <div class="list-header">
        <div class="sel-all-wrap">
          <input type="checkbox" class="sel-all-check" id="selAllCheck" onchange="toggleSelectAll()" title="全选">
        </div>
        <span class="list-title" id="listTitle">收件箱</span>
        <span class="list-count" id="listCount"></span>
      </div>
      <div class="bulk-bar" id="bulkBar">
        <span class="bulk-count" id="bulkCount">已选 0 封</span>
        <button class="btn-bulk-del" onclick="bulkDelete()">🗑 删除所选</button>
        <button class="btn-bulk-cancel" onclick="clearSelection()">取消</button>

        <div class="list-loading">加载中…</div>
      </div>

    <!-- Detail / Compose -->

        </svg>
        <span>选择一封邮件查看</span>
      </div>
    </div>

  </div>
</div>

<!-- Account Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">添加邮箱</span>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">

          <label class="form-label">收信服务器 IMAP <span class="req">*</span></label>

        <div class="form-group">
          <label class="form-label">端口</label>
          <input class="form-ctrl" id="fImapPort" placeholder="993" type="number">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">发信服务器 SMTP <span class="req">*</span></label>
          <input class="form-ctrl" id="fSmtpHost" placeholder="smtp.hostinger.com">
        </div>
        <div class="form-group">
          <label class="form-label">端口</label>
          <input class="form-ctrl" id="fSmtpPort" placeholder="465" type="number">
        </div>

      <div class="form-group">
        <label class="form-label">登录用户名（留空则用邮箱地址）</label>
        <input class="form-ctrl" id="fUsername" placeholder="通常与邮箱地址相同">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱密码 <span class="req" id="passReq">*</span></label>
        <input class="form-ctrl" id="fPassword" type="password" placeholder="邮箱密码">
        <div class="form-hint" id="passHint" style="display:none">留空则不修改密码</div>
      </div>

    <div class="modal-footer">
      <button class="btn-modal-delete" id="btnDeleteAccount" style="display:none" onclick="confirmDeleteAccount()">🗑 删除此账号</button>
      <button class="btn-modal-cancel" onclick="closeModal()">取消</button>

<!-- Table insert dialog -->
<div class="tbl-dlg-overlay" id="tblOverlay" onclick="closeTableDialog()"></div>
<div class="tbl-dlg" id="tblDlg">
  <div class="tbl-dlg-title">⊞ 插入表格</div>
  <div class="tbl-row"><span>行数</span><input class="tbl-num" id="tblRows" type="number" min="1" max="20" value="3" onkeydown="if(event.key==='Enter')confirmInsertTable()"></div>
  <div class="tbl-row"><span>列数</span><input class="tbl-num" id="tblCols" type="number" min="1" max="15" value="3" onkeydown="if(event.key==='Enter')confirmInsertTable()"></div>
  <div class="tbl-dlg-btns">
    <button class="btn-tbl-cancel" onclick="closeTableDialog()">取消</button>
    <button class="btn-tbl-ok" onclick="confirmInsertTable()">插入</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
const API = '';
let token = localStorage.getItem('crm_token');
if (!token) location.href = 'login.html';

let currentFolder    = 'INBOX';
let currentEmailId   = null;
let currentAccountId = null; // null = 使用环境变量默认账号
let quillEditor      = null;
let attachments      = [];
let editingAccountId = null;

// ── Auth fetch ──
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) },
    body: opts.body ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
  });
  if (res.status === 401) { localStorage.removeItem('crm_token'); location.href = 'login.html'; }
  return res;
}

// ── Toast ──
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = (type==='ok'?'✓ ':'✗ ') + msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// ── Date format ──
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  if ((now - d) / 86400000 < 7) return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Accounts ──
async function loadAccounts() {
  try {
    const res  = await apiFetch('/api/email-accounts');
    const list = await res.json();
    renderAccounts(Array.isArray(list) ? list : []);
  } catch {
    document.getElementById('acctList').innerHTML = '<div class="acct-empty">加载失败</div>';
  }
}

function renderAccounts(accounts) {
  const el = document.getElementById('acctList');
  if (!accounts.length) {
    el.innerHTML = '<div class="acct-empty">暂无账号，点 ＋ 添加</div>';
    return;
  }
  el.innerHTML = accounts.map(a => `
    <div class="acct-item ${a.id === currentAccountId ? 'active' : ''}" onclick="selectAccount('${a.id}',this)">
      <span class="acct-dot"></span>
      <span class="acct-email" title="${esc(a.email)}">${esc(a.display_name || a.email)}</span>
      <button class="btn-edit-acct" onclick="event.stopPropagation();openAccountModal(${JSON.stringify(JSON.stringify(a))})" title="编辑">✎</button>
    </div>
  `).join('');
}

function selectAccount(id, el) {
  currentAccountId = id;
  document.querySelectorAll('.acct-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  loadEmails(currentFolder);
}

// ── Account Modal ──
function openAccountModal(accountJson = null) {
  const a = accountJson ? JSON.parse(accountJson) : null;
  editingAccountId = a?.id || null;
  document.getElementById('modalTitle').textContent = a ? '编辑邮箱' : '添加邮箱';
  document.getElementById('fDisplayName').value = a?.display_name || '';
  document.getElementById('fEmail').value        = a?.email || '';
  document.getElementById('fFromName').value     = a?.from_name || '';
  document.getElementById('fImapHost').value     = a?.imap_host || '';
  document.getElementById('fImapPort').value     = a?.imap_port || '993';
  document.getElementById('fSmtpHost').value     = a?.smtp_host || '';
  document.getElementById('fSmtpPort').value     = a?.smtp_port || '465';
  document.getElementById('fUsername').value     = a?.username || '';
  document.getElementById('fPassword').value     = '';
  document.getElementById('fPassword').placeholder = a ? '不修改则留空' : '邮箱密码';
  document.getElementById('passReq').style.display  = a ? 'none' : '';
  document.getElementById('passHint').style.display  = a ? '' : 'none';
  document.getElementById('btnDeleteAccount').style.display = a ? '' : 'none';
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('modalStatus').className = 'modal-status';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingAccountId = null;
}

async function saveAccount() {
  const display_name = document.getElementById('fDisplayName').value.trim();
  const email        = document.getElementById('fEmail').value.trim();
  const from_name    = document.getElementById('fFromName').value.trim();
  const imap_host    = document.getElementById('fImapHost').value.trim();
  const imap_port    = parseInt(document.getElementById('fImapPort').value) || 993;
  const smtp_host    = document.getElementById('fSmtpHost').value.trim();
  const smtp_port    = parseInt(document.getElementById('fSmtpPort').value) || 465;
  const username     = document.getElementById('fUsername').value.trim() || email;
  const password     = document.getElementById('fPassword').value;
  const statusEl     = document.getElementById('modalStatus');

  if (!display_name || !email || !imap_host || !smtp_host) {
    statusEl.textContent = '请填写带 * 的必填项'; statusEl.className = 'modal-status err'; return;
  }
  if (!editingAccountId && !password) {
    statusEl.textContent = '请输入邮箱密码'; statusEl.className = 'modal-status err'; return;
  }

  const data = { display_name, email, from_name, imap_host, imap_port, smtp_host, smtp_port, username, is_active: true };
  if (password) data.password = password;

  statusEl.textContent = '保存中…'; statusEl.className = 'modal-status';

  try {
    const url    = editingAccountId ? `/api/email-accounts/${editingAccountId}` : '/api/email-accounts';
    const method = editingAccountId ? 'PUT' : 'POST';
    const res    = await apiFetch(url, { method, body: JSON.stringify(data) });
    const result = await res.json();
    if (result.success || result.data) {
      showToast(editingAccountId ? '邮箱已更新' : '邮箱已添加');
      closeModal();
      loadAccounts();
    } else {
      statusEl.textContent = result.message || '保存失败'; statusEl.className = 'modal-status err';
    }
  } catch (e) {
    statusEl.textContent = '失败：' + e.message; statusEl.className = 'modal-status err';
  }
}

async function confirmDeleteAccount() {
  if (!confirm('确定删除这个邮箱账号吗？该账号下的邮件记录不会被删除。')) return;
  try {
    await apiFetch(`/api/email-accounts/${editingAccountId}`, { method: 'DELETE' });
    showToast('账号已删除');
    if (currentAccountId === editingAccountId) { currentAccountId = null; loadEmails(currentFolder); }
    closeModal();
    loadAccounts();
  } catch (e) { showToast('删除失败：' + e.message, 'err'); }
}

// ── Email list ──
async function loadEmails(folder) {
  const list = document.getElementById('emailList');
  list.innerHTML = '<div class="list-loading">加载中…</div>';
  selectedIds.clear();
  document.getElementById('bulkBar')?.classList.remove('show');
  const selAll = document.getElementById('selAllCheck');
  if (selAll) { selAll.checked = false; selAll.indeterminate = false; }
  try {
    const acct = currentAccountId ? `&account_id=${currentAccountId}` : '';
    const res   = await apiFetch(`/api/emails?folder=${folder}${acct}`);
    const emails = await res.json();
    renderList(emails);
    document.getElementById('listCount').textContent = emails.length ? `${emails.length} 封` : '';
    if (folder === 'INBOX') updateBadge(emails);
  } catch (e) {
    list.innerHTML = `<div class="list-empty">加载失败：${e.message}</div>`;
  }
}

function updateBadge(emails) {
  const unread = emails.filter(e => !e.is_read).length;
  const b = document.getElementById('badge-inbox');
  b.textContent = unread; b.style.display = unread ? '' : 'none';
}

let selectedIds = new Set();

function renderList(emails) {
  const list = document.getElementById('emailList');
  if (!emails.length) { list.innerHTML = '<div class="list-empty">暂无邮件</div>'; return; }
  list.innerHTML = emails.map(e => `
    <div class="email-item ${e.is_read?'':'unread'} ${e.id===currentEmailId?'active':''} ${selectedIds.has(e.id)?'selected':''}"
         data-id="${e.id}" onclick="handleItemClick(event,'${e.id}',this)">
      <div class="ei-row">
        <input type="checkbox" class="ei-check" data-id="${e.id}"
               ${selectedIds.has(e.id)?'checked':''} onchange="toggleEmailSelect('${e.id}',this)" onclick="event.stopPropagation()">
        ${!e.is_read?'<span class="unread-dot"></span>':''}
        <div class="ei-from" style="flex:1">${esc(e.from_name||e.from_address)}</div>
      </div>
      <div class="ei-subject">${esc(e.subject)}</div>
      <div class="ei-date">${fmtDate(e.received_at)}</div>
    </div>
  `).join('');
}

function handleItemClick(event, id, el) {
  if (event.target.type === 'checkbox') return;
  openEmail(id, el);
}

function toggleEmailSelect(id, checkbox) {
  if (checkbox.checked) selectedIds.add(id);
  else selectedIds.delete(id);
  const item = document.querySelector(`.email-item[data-id="${id}"]`);
  if (item) item.classList.toggle('selected', checkbox.checked);
  updateBulkBar();
}

function toggleSelectAll() {
  const checked = document.getElementById('selAllCheck').checked;
  document.querySelectorAll('.ei-check').forEach(cb => {
    const id = cb.dataset.id;
    cb.checked = checked;
    checked ? selectedIds.add(id) : selectedIds.delete(id);
    const item = document.querySelector(`.email-item[data-id="${id}"]`);
    if (item) item.classList.toggle('selected', checked);
  });
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const n = selectedIds.size;
  if (n > 0) {
    bar.classList.add('show');
    document.getElementById('bulkCount').textContent = `已选 ${n} 封`;
  } else {
    bar.classList.remove('show');
  }
  const allBoxes = document.querySelectorAll('.ei-check');
  const selAll = document.getElementById('selAllCheck');
  if (selAll && allBoxes.length) {
    selAll.indeterminate = n > 0 && n < allBoxes.length;
    selAll.checked = n === allBoxes.length;
  }
}

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.ei-check').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('.email-item.selected').forEach(el => el.classList.remove('selected'));
  const selAll = document.getElementById('selAllCheck');
  if (selAll) { selAll.checked = false; selAll.indeterminate = false; }
  document.getElementById('bulkBar').classList.remove('show');
}

async function bulkDelete() {
  const ids = [...selectedIds];
  if (!ids.length) return;
  if (!confirm(`确定删除选中的 ${ids.length} 封邮件吗？`)) return;
  try {
    await Promise.all(ids.map(id => apiFetch(`/api/emails/${id}`, { method: 'DELETE' })));
    showToast(`已删除 ${ids.length} 封邮件`);
    selectedIds.clear();
    if (ids.includes(currentEmailId)) { currentEmailId = null; showPlaceholder(); }
    loadEmails(currentFolder);
  } catch (e) { showToast('删除失败：' + e.message, 'err'); }
}

// ── Open email ──
async function openEmail(id, el) {
  currentEmailId = id;
  document.querySelectorAll('.email-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">加载中…</div>';
  try {
    const res   = await apiFetch(`/api/emails/${id}`);
    const email = await res.json();
    if (!email.is_read) {
      apiFetch(`/api/emails/${id}/read`, { method:'PATCH', body: JSON.stringify({ is_read:true }) });
      el?.classList.remove('unread');
      el?.querySelector('.unread-dot')?.remove();
    }
    panel.innerHTML = `
      <div class="reader">
        <div class="reader-header">
          <div class="reader-subject">${esc(email.subject)}</div>
          <div class="reader-meta">
            <div><strong>发件人：</strong>${esc(email.from_name ? `${email.from_name} <${email.from_address}>` : email.from_address)}</div>
            <div><strong>收件人：</strong>${esc(email.to_addresses)}</div>
            ${email.cc?`<div><strong>抄送：</strong>${esc(email.cc)}</div>`:''}
            <div><strong>时间：</strong>${new Date(email.received_at).toLocaleString('zh-CN')}</div>
          </div>
          <div class="reader-actions">
            <button class="btn-action" onclick="replyEmail(${JSON.stringify(esc(email.from_address))},${JSON.stringify(esc(email.subject))})">↩ 回复</button>
            <button class="btn-action" onclick="forwardEmail(${JSON.stringify(esc(email.subject))},${JSON.stringify(esc(email.body_html||email.body_text||''))})">⤷ 转发</button>
            <button class="btn-action danger" onclick="deleteEmail('${email.id}')">🗑 删除</button>
          </div>
        </div>
        <div class="reader-body">
          ${email.body_html
            ? `<div class="reader-html">${sanitizeHtml(email.body_html)}</div>`
            : `<div class="reader-text">${esc(email.body_text||'（无内容）')}</div>`}
        </div>
      </div>`;
  } catch (e) {
    panel.innerHTML = `<div style="padding:24px;color:var(--danger)">加载失败：${e.message}</div>`;
  }
}

function sanitizeHtml(html) {
  return html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<iframe[\s\S]*?<\/iframe>/gi,'')
    .replace(/on\w+="[^"]*"/gi,'').replace(/on\w+='[^']*'/gi,'');
}

// ── Folder switch ──
function selectFolder(folder, el) {
  currentFolder = folder;
  currentEmailId = null;
  document.querySelectorAll('.folder-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('listTitle').textContent = folder==='INBOX'?'收件箱':'已发送';
  showPlaceholder();
  loadEmails(folder);
}

function showPlaceholder() {
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
      </svg>
      <span>选择一封邮件查看</span>
    </div>`;
}

// ── Sync ──
async function syncEmails() {
  const btn = document.getElementById('btnSync');
  const icon = document.getElementById('syncIcon');
  btn.classList.add('syncing'); icon.textContent = '⏳';
  try {
    const res  = await apiFetch('/api/emails/sync', { method:'POST', body: JSON.stringify({ account_id: currentAccountId }) });
    const data = await res.json();
    if (data.success) { showToast(`同步完成，新增 ${data.synced} 封`); loadEmails(currentFolder); }
    else showToast(data.message||'同步失败','err');
  } catch (e) { showToast('同步失败：'+e.message,'err'); }
  finally { btn.classList.remove('syncing'); icon.textContent = '🔄'; }
}

// ── Compose ──
function openCompose(opts = {}) {
  attachments = [];
  document.getElementById('detailPanel').innerHTML = `
    <div class="compose">
      <div class="compose-header">
        <span class="compose-title">✏️ ${opts.title||'写邮件'}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-fs" id="btnFullscreen" onclick="toggleComposeFullscreen()" title="全屏">⛶</button>
          <button class="btn-close" onclick="showPlaceholder()">✕</button>
        </div>
      </div>
      <div class="compose-form">
        <div class="field-row"><span class="field-label">收件人</span><input class="field-input" id="cTo" placeholder="example@domain.com" value="${opts.to||''}"></div>
        <div class="field-row"><span class="field-label">抄送</span><input class="field-input" id="cCc" placeholder="可选"></div>
        <div class="field-row"><span class="field-label">主题</span><input class="field-input" id="cSubject" placeholder="邮件主题" value="${opts.subject||''}"></div>
        <div class="compose-editor" id="quillWrap"></div>
        <div class="table-tools">
          <button class="attach-btn" onclick="openTableDialog()">⊞ 插入表格</button>
          <button class="table-tool-btn" onclick="addTableRow()">+ 行</button>
          <button class="table-tool-btn" onclick="addTableColumn()">+ 列</button>
          <button class="table-tool-btn" onclick="toggleHeaderRow()">表头开关</button>
          <button class="table-tool-btn" onclick="toggleStripeRows()">斑马纹</button>
        </div>
        <div class="attach-area" id="attachArea">
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎 添加附件</button>
          <input type="file" id="fileInput" style="display:none" multiple onchange="addFiles(this)">
        </div>
      </div>
      <div class="compose-footer">
        <button class="btn-send" id="btnSend" onclick="sendEmail()">📨 发送</button>
        <span class="send-status" id="sendStatus"></span>
      </div>
    </div>`;
  quillEditor = new Quill('#quillWrap', {
    theme: 'snow', placeholder: '在此输入邮件内容…',
    modules: { toolbar: [
      [{ header:[1,2,3,false] }],
      ['bold','italic','underline','strike'],
      [{ color:[] },{ background:[] }],
      [{ list:'ordered' },{ list:'bullet' }],
      [{ align:[] }],
      ['link'],['clean'],
    ]},
  });
  if (opts.body) quillEditor.clipboard.dangerouslyPasteHTML(opts.body);
}

function addFiles(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { attachments.push({ filename:file.name, content:e.target.result.split(',')[1], contentType:file.type }); renderChips(); };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderChips() {
  const area = document.getElementById('attachArea');
  if (!area) return;
  area.innerHTML = `<button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎 添加附件</button>
    <input type="file" id="fileInput" style="display:none" multiple onchange="addFiles(this)">` +
    attachments.map((a,i) => `<div class="attach-chip">📄 ${esc(a.filename)}<span class="rm" onclick="removeFile(${i})">✕</span></div>`).join('');
}

function removeFile(i) { attachments.splice(i,1); renderChips(); }

function replyEmail(to, subject) {
  openCompose({ title:'回复', to, subject: subject.startsWith('Re:')?subject:`Re: ${subject}` });
}

function forwardEmail(subject, body) {
  openCompose({ title:'转发', subject: subject.startsWith('Fwd:')?subject:`Fwd: ${subject}`, body:`<br><br><hr><p><b>--- 转发邮件 ---</b></p>${body}` });
}

async function sendEmail() {
  const to       = document.getElementById('cTo')?.value?.trim();
  const cc       = document.getElementById('cCc')?.value?.trim();
  const subject  = document.getElementById('cSubject')?.value?.trim();
  const body_html = quillEditor ? quillEditor.root.innerHTML : '';
  const body_text = quillEditor ? quillEditor.getText().trim() : '';
  const statusEl  = document.getElementById('sendStatus');
  const btn       = document.getElementById('btnSend');

  if (!to||!subject) { statusEl.textContent='收件人和主题不能为空'; statusEl.className='send-status err'; return; }
  btn.disabled = true; statusEl.textContent='发送中…'; statusEl.className='send-status';

  try {
    const res  = await apiFetch('/api/emails/send', { method:'POST', body: JSON.stringify({ to, cc, subject, body_html, body_text, attachments, account_id: currentAccountId }) });
    const data = await res.json();
    if (data.success) {
      statusEl.textContent='✓ 发送成功'; statusEl.className='send-status ok';
      showToast('邮件发送成功');
      setTimeout(showPlaceholder, 1500);
    } else {
      statusEl.textContent = data.message||'发送失败'; statusEl.className='send-status err'; btn.disabled=false;
    }
  } catch (e) {
    statusEl.textContent='发送失败：'+e.message; statusEl.className='send-status err'; btn.disabled=false;
  }
}

// ── Delete ──
async function deleteEmail(id) {
  if (!confirm('确定删除这封邮件吗？')) return;
  try {
    await apiFetch(`/api/emails/${id}`, { method:'DELETE' });
    showToast('邮件已删除'); showPlaceholder(); loadEmails(currentFolder);
  } catch (e) { showToast('删除失败：'+e.message,'err'); }
}

// ── Fullscreen compose ──
function toggleComposeFullscreen() {
  const panel = document.getElementById('detailPanel');
  const btn   = document.getElementById('btnFullscreen');
  if (!panel || !btn) return;
  const isFs = panel.classList.toggle('fullscreen');
  btn.textContent = isFs ? '⊡' : '⛶';
  btn.title       = isFs ? '退出全屏' : '全屏';
}

// ── Table insert ──
function openTableDialog() {
  if (!quillEditor) return;
  document.getElementById('tblOverlay').classList.add('open');
  document.getElementById('tblDlg').classList.add('open');
  setTimeout(() => document.getElementById('tblRows').focus(), 50);
}

function closeTableDialog() {
  document.getElementById('tblOverlay').classList.remove('open');
  document.getElementById('tblDlg').classList.remove('open');
}

function confirmInsertTable() {
  const rows = Math.max(1, Math.min(20, parseInt(document.getElementById('tblRows').value) || 3));
  const cols = Math.max(1, Math.min(15, parseInt(document.getElementById('tblCols').value) || 3));
  closeTableDialog();
  if (!quillEditor) return;
  const th   = Array(cols).fill('<th>&nbsp;</th>').join('');
  const td   = Array(cols).fill('<td>&nbsp;</td>').join('');
  const body = Array(Math.max(0, rows - 1)).fill(`<tr>${td}</tr>`).join('');
  const html = `<table class="mail-table"><thead><tr>${th}</tr></thead><tbody>${body}</tbody></table><p><br></p>`;
  const range = quillEditor.getSelection(true);
  quillEditor.clipboard.dangerouslyPasteHTML(range ? range.index : quillEditor.getLength(), html);
}

function getActiveTableCell() {
  const sel = window.getSelection();
  if (!sel || !sel.anchorNode) return null;
  const node = sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
  return node?.closest?.('td,th') || null;
}

function getActiveTable() {
  const cell = getActiveTableCell();
  return cell ? cell.closest('table') : null;
}

function markActiveTable(table) {
  document.querySelectorAll('.ql-editor table.active-table').forEach(t => t.classList.remove('active-table'));
  if (table) table.classList.add('active-table');
}

function addTableRow() {
  const cell = getActiveTableCell();
  if (!cell) return showToast('请先把光标放到表格内', 'err');
  const row = cell.closest('tr');
  const cols = row.children.length;
  const tag = row.parentElement.tagName.toLowerCase() === 'thead' ? 'th' : 'td';
  const newRow = document.createElement('tr');
  for (let i = 0; i < cols; i++) {
    const c = document.createElement(tag);
    c.innerHTML = '&nbsp;';
    newRow.appendChild(c);
  }
  row.insertAdjacentElement('afterend', newRow);
  markActiveTable(row.closest('table'));
}

function addTableColumn() {
  const cell = getActiveTableCell();
  if (!cell) return showToast('请先把光标放到表格内', 'err');
  const table = cell.closest('table');
  const idx = Array.from(cell.parentElement.children).indexOf(cell);
  table.querySelectorAll('tr').forEach(tr => {
    const ref = tr.children[Math.min(idx, tr.children.length - 1)];
    const tag = ref && ref.tagName ? ref.tagName.toLowerCase() : (tr.closest('thead') ? 'th' : 'td');
    const c = document.createElement(tag);
    c.innerHTML = '&nbsp;';
    if (ref) ref.insertAdjacentElement('afterend', c);
    else tr.appendChild(c);
  });
  markActiveTable(table);
}

function toggleHeaderRow() {
  const table = getActiveTable();
  if (!table) return showToast('请先把光标放到表格内', 'err');
  const firstRow = table.querySelector('tr');
  if (!firstRow) return;
  const hasHead = !!table.querySelector('thead');
  if (hasHead) {
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody') || table;
    const row = thead.querySelector('tr');
    row.querySelectorAll('th').forEach(th => {
      const td = document.createElement('td');
      td.innerHTML = th.innerHTML || '&nbsp;';
      th.replaceWith(td);
    });
    tbody.insertAdjacentElement('afterbegin', row);
    thead.remove();
  } else {
    const source = table.querySelector('tbody tr') || firstRow;
    const headRow = source.cloneNode(true);
    headRow.querySelectorAll('td').forEach(td => {
      const th = document.createElement('th');
      th.innerHTML = td.innerHTML || '&nbsp;';
      td.replaceWith(th);
    });
    const thead = document.createElement('thead');
    thead.appendChild(headRow);
    table.insertAdjacentElement('afterbegin', thead);
    if (source.parentElement) source.remove();
  }
  markActiveTable(table);
}

function toggleStripeRows() {
  const table = getActiveTable();
  if (!table) return showToast('请先把光标放到表格内', 'err');
  table.classList.toggle('is-striped');
  markActiveTable(table);
}
