<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1c45">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TPKELE">
<script src="/pwa.js" defer></script>
<title>AI 助手 · TPKELE CRM</title>
<style>
:root{
  --bg:#0F1F1C;--panel:#162623;--panel2:#1B2E2A;--hover:#1F3A35;
  --border:#244841;--text:#E6F4EF;--muted:#9DB5AC;--muted2:#c4d5cc;
  --primary:#10B981;--primary2:#34D399;--accent:#6EE7B7;
  --success:#10B981;--danger:#ef4444;--warning:#f59e0b;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Microsoft YaHei Light","微软雅黑 Light","Microsoft YaHei","微软雅黑","Segoe UI Light","Segoe UI",-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  font-weight:300;background:var(--bg);
  color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;
}
strong,h1,h2,h3,th,.btn-primary{font-weight:600}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 24px;background:var(--panel);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;
}
.brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.brand-icon{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  display:grid;place-items:center;font-size:15px;color:#0F1F1C;
}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:12.5px;
  font-weight:500;transition:.18s;display:inline-flex;align-items:center;gap:6px;
  font-family:inherit;
}
.btn:hover{border-color:var(--primary);background:var(--hover);color:var(--primary2)}
.btn-primary{background:var(--primary);color:#0F1F1C;border-color:transparent;font-weight:600}
.btn-primary:hover{background:var(--primary2);color:#0F1F1C}
.badge{
  display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;
  font-size:11px;font-weight:500;border:1px solid var(--border);color:var(--muted);
  background:var(--panel2);
}
.badge.ok{border-color:var(--primary);color:var(--primary2);background:rgba(16,185,129,.1)}
.badge.warn{border-color:rgba(245,158,11,.4);color:var(--warning)}

/* ── Main layout ── */
.main{max-width:1100px;margin:0 auto;padding:12px 24px}
.mode-bar{
  display:flex;gap:8px;margin-bottom:8px;
}
.mode-btn{
  flex:1;min-width:0;padding:5px 12px;border-radius:8px;
  border:1px solid var(--border);background:var(--panel);cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:.18s;color:var(--text);font-family:inherit;text-align:left;
}
.mode-btn:hover{border-color:var(--primary);background:var(--hover)}
.mode-btn.active{
  border-color:var(--primary);
  background:linear-gradient(135deg,rgba(16,185,129,0.18),rgba(52,211,153,0.06));
  box-shadow:0 0 0 1px rgba(16,185,129,0.4);
}
.mode-btn.active .mode-btn-title{color:var(--primary2)}
.mode-btn-icon{font-size:16px;flex-shrink:0}
.mode-btn-text{display:flex;align-items:baseline;gap:8px;min-width:0;flex:1;line-height:1.2;white-space:nowrap;overflow:hidden}
.mode-btn-title{font-size:13px;font-weight:600;flex-shrink:0}
.mode-btn-desc{font-size:10.5px;color:var(--muted);font-weight:400;overflow:hidden;text-overflow:ellipsis;min-width:0}

.status-line{
  font-size:11.5px;color:var(--muted);margin-bottom:8px;display:flex;
  align-items:center;gap:8px;flex-wrap:wrap;padding:0 4px;
}
.status-line strong{color:var(--primary2);font-weight:600}
.status-line .dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.status-line .dot.live{background:var(--primary);box-shadow:0 0 8px var(--primary)}

/* ── Chat ── */
.chat-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;display:flex;flex-direction:column;
  height:calc(100vh - 145px);min-height:380px;box-shadow:var(--shadow);
}
.chat-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px;border-bottom:1px solid var(--border);background:var(--panel2);
  font-size:11.5px;color:var(--muted);
}
.chat-toolbar-actions{display:flex;gap:4px}
.icon-btn{
  background:transparent;border:1px solid transparent;color:var(--muted);cursor:pointer;
  padding:3px 8px;border-radius:6px;font-size:11.5px;transition:.15s;font-family:inherit;
}
.icon-btn:hover{color:var(--primary2);border-color:var(--border);background:var(--hover)}

.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;align-items:flex-start;max-width:100%;animation:fadeIn .25s}
.msg-user{flex-direction:row-reverse}
.avatar{
  width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  font-size:16px;flex-shrink:0;background:var(--panel2);border:1px solid var(--border);
}
.msg-user .avatar{background:linear-gradient(135deg,var(--primary),var(--primary2));border-color:transparent;color:#0F1F1C}
.bubble{padding:12px 16px;border-radius:13px;font-size:14px;line-height:1.75;max-width:78%;word-break:break-word}
.msg-bot .bubble{background:var(--panel2);border:1px solid var(--border);color:var(--text)}
.msg-user .bubble{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#0F1F1C;font-weight:500}
.bubble pre{background:rgba(0,0,0,.35);border-radius:7px;padding:10px;overflow-x:auto;font-size:12.5px;margin:6px 0}
.bubble code{background:rgba(0,0,0,.25);border-radius:3px;padding:1px 5px;font-size:13px}
.thinking{color:var(--muted);font-style:italic;display:flex;align-items:center;gap:6px}
.dot-anim{display:inline-block;animation:blink 1.2s infinite;color:var(--primary)}
.dot-anim:nth-child(2){animation-delay:.2s}.dot-anim:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.input-bar{border-top:1px solid var(--border);padding:14px 18px;display:flex;gap:10px;align-items:flex-end;background:var(--panel2)}
.input-area{
  flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-size:14px;outline:none;resize:none;
  min-height:46px;max-height:160px;line-height:1.6;transition:.15s;font-family:inherit;
}
.input-area:focus{border-color:var(--primary);background:var(--hover)}
.input-area::placeholder{color:var(--muted)}
.btn-send{
  padding:11px 22px;border-radius:9px;border:none;background:var(--primary);
  color:#0F1F1C;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;
  transition:.15s;white-space:nowrap;font-family:inherit;
}
.btn-send:hover{background:var(--primary2)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border);
}
.modal-head h2{font-size:17px;font-weight:600}
.modal-close{
  background:transparent;border:none;color:var(--muted);font-size:24px;cursor:pointer;
  width:30px;height:30px;border-radius:7px;display:grid;place-items:center;
}
.modal-close:hover{color:var(--danger);background:rgba(239,68,68,.1)}
.modal-body{padding:18px 22px}
.modal-foot{
  display:flex;align-items:center;gap:10px;padding:14px 22px;
  border-top:1px solid var(--border);background:var(--panel2);
}
.modal-foot .status{flex:1;font-size:12px;color:var(--muted)}

/* Provider section */
.prov-sec{
  border:1px solid var(--border);border-radius:10px;margin-bottom:12px;
  background:var(--panel2);overflow:hidden;
}
.prov-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;cursor:pointer;font-weight:500;font-size:14px;
  transition:.15s;
}
.prov-head:hover{background:var(--hover)}
.prov-head .arrow{transition:.2s;color:var(--muted)}
.prov-sec.open .prov-head .arrow{transform:rotate(180deg)}
.prov-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);padding-top:14px}
.prov-sec.open .prov-body{display:block}
.prov-status{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.05);color:var(--muted);margin-left:8px}
.prov-status.ok{background:rgba(16,185,129,.18);color:var(--primary2)}
.field{margin-bottom:12px}
.field label{
  display:block;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;
}
.field input,.field textarea{
  width:100%;background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;
  font-family:inherit;transition:.15s;font-weight:400;
}
.field input:focus,.field textarea:focus{border-color:var(--primary);background:var(--hover)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field small{display:block;color:var(--muted);font-size:11px;margin-top:4px;line-height:1.5}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;font-size:13px;box-shadow:var(--shadow);
  transform:translateY(20px);opacity:0;transition:.25s;pointer-events:none;max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--primary);color:var(--primary2)}
.toast.err{border-color:var(--danger);color:var(--danger)}

/* Responsive */
@media(max-width:768px){
  .main{padding:12px}
  .mode-bar{flex-wrap:wrap}
  .mode-btn{flex:1 1 calc(50% - 5px);min-width:140px}
  .mode-btn-desc{display:none}
  .header{padding:12px 16px}
  .brand span:not(.brand-icon){font-size:14px}
  .chat-card{height:calc(100vh - 320px)}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <span class="brand-icon">⚡</span>
    <span>AI 助手 · TPKELE</span>
  </div>
  <div class="header-actions">
    <span class="badge" id="providerBadge">未配置</span>
    <button class="btn" onclick="window.close()">← 关闭</button>
    <button class="btn btn-primary" onclick="openSettings()">⚙ 设置 API</button>
  </div>
</div>

<div class="main">
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="translate" onclick="switchMode('translate')">
      <span class="mode-btn-icon">🌐</span>
      <span class="mode-btn-text">
        <span class="mode-btn-title">翻译</span>
        <span class="mode-btn-desc">中英互译 · DeepSeek-V3</span>
      </span>
    </button>
    <button class="mode-btn" data-mode="chat" onclick="switchMode('chat')">
      <span class="mode-btn-icon">💬</span>
      <span class="mode-btn-text">
        <span class="mode-btn-title">日常聊天</span>
        <span class="mode-btn-desc">通用对话 · Qwen2.5-72B</span>
      </span>
    </button>
    <button class="mode-btn" data-mode="trade" onclick="switchMode('trade')">
      <span class="mode-btn-icon">📧</span>
      <span class="mode-btn-text">
        <span class="mode-btn-title">外贸文案</span>
        <span class="mode-btn-desc">邮件/报价/催款 · Kimi-K2</span>
      </span>
    </button>
  </div>

  <div class="status-line">
    <span class="dot" id="statusDot"></span>
    当前模式：<strong id="curMode">翻译</strong>
    · 模型：<strong id="curModel">—</strong>
    · 提供商：<strong id="curProvider">SiliconFlow</strong>
  </div>

  <div class="chat-card">
    <div class="chat-toolbar">
      <span id="toolbarHint">🌐 粘贴文本，自动中英互译</span>
      <div class="chat-toolbar-actions">
        <button class="icon-btn" onclick="clearChat()">🗑 清空</button>
        <button class="icon-btn" onclick="copyLastReply()">📋 复制上条</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea class="input-area" id="input" rows="1"
        placeholder="粘贴要翻译的内容（中⇄英自动判断）…"
        onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btnSend" onclick="send()">发送 ↵</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-head">
      <h2>⚙ AI 设置</h2>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body" id="settingsBody"></div>
    <div class="modal-foot">
      <span class="status" id="settingsStatus"></span>
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  AI 助手 v2 · 多模式 · localStorage 配置
// ═══════════════════════════════════════════════════════

const LS_KEY = 'tpkele_ai_settings_v2';

const DEFAULT_SETTINGS = {
  // 4 家 API
  gpt:        { key:'', baseUrl:'https://api.openai.com/v1',                            model:'gpt-4o-mini' },
  claude:     { key:'', baseUrl:'https://api.anthropic.com/v1',                         model:'claude-sonnet-4-5' },
  gemini:     { key:'', baseUrl:'https://generativelanguage.googleapis.com/v1beta',     model:'gemini-2.5-flash' },
  silicon:    {
    key:'',
    baseUrl:'https://api.siliconflow.cn/v1',
    modelChat:      'Qwen/Qwen2.5-72B-Instruct',
    modelTranslate: 'deepseek-ai/DeepSeek-V3',
    modelTrade:     'Pro/moonshotai/Kimi-K2-Instruct'
  },
  // 系统提示词
  prompts: {
    chat:      '你是一个友善、博学的中文 AI 助手，回答简洁清晰。如果用户没有指定语言，默认用中文回复。',
    translate: '你是专业翻译官。规则：\n1. 自动识别输入语言，中文输入→翻译成英文；其他语言→翻译成中文。\n2. 只输出译文，不要任何解释、不要前缀（如"译文："）。\n3. 保持原文格式（换行、列表、标点）。\n4. 专业术语精准，语气自然，符合目标语言习惯。\n5. 涉及外贸场景时使用商务用语。',
    trade:     '你是有 15 年经验的资深外贸业务员，擅长撰写专业的英文外贸沟通材料：询价函、报价单、催款邮件、产品描述、PI/合同条款、客户跟进、投诉应对等。\n规则：\n1. 默认输出英文，除非用户明确要求中文。\n2. 语气专业、礼貌、有商务气场，避免生硬翻译腔。\n3. 结构清晰，常用 Dear / Best regards 等标准格式。\n4. 涉及金额、数量、交期等关键信息要醒目（粗体或单独成行）。\n5. 主动给出 1-2 条优化建议（如有）。'
  }
};

const MODE_INFO = {
  chat:      { name:'日常聊天', icon:'💬', placeholder:'随便聊聊…',                                hint:'💬 随便聊聊…' },
  translate: { name:'翻译',     icon:'🌐', placeholder:'粘贴要翻译的内容（中⇄英自动判断）…',     hint:'🌐 粘贴文本，自动中英互译' },
  trade:     { name:'外贸文案', icon:'📧', placeholder:'描述你要写的内容，例如：给客户写一封催 30% 定金的邮件…', hint:'📧 描述需求，自动生成专业英文外贸文案' }
};

let settings = loadSettings();
let currentMode = 'translate';
let history = []; // 当前模式的对话历史

// ── localStorage ──
function loadSettings(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    const saved = JSON.parse(raw);
    // 深合并默认值（防止新增字段缺失）
    return deepMerge(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)), saved);
  }catch{ return JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
}
function deepMerge(a,b){
  for(const k in b){
    if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])) a[k]=deepMerge(a[k]||{}, b[k]);
    else if(b[k]!==undefined&&b[k]!=='') a[k]=b[k];
  }
  return a;
}
function saveSettings(){
  // 从弹窗收集
  settings.gpt.key        = val('f_gpt_key');
  settings.gpt.baseUrl    = val('f_gpt_base') || DEFAULT_SETTINGS.gpt.baseUrl;
  settings.gpt.model      = val('f_gpt_model') || DEFAULT_SETTINGS.gpt.model;

  settings.claude.key     = val('f_claude_key');
  settings.claude.baseUrl = val('f_claude_base') || DEFAULT_SETTINGS.claude.baseUrl;
  settings.claude.model   = val('f_claude_model') || DEFAULT_SETTINGS.claude.model;

  settings.gemini.key     = val('f_gemini_key');
  settings.gemini.baseUrl = val('f_gemini_base') || DEFAULT_SETTINGS.gemini.baseUrl;
  settings.gemini.model   = val('f_gemini_model') || DEFAULT_SETTINGS.gemini.model;

  settings.silicon.key            = val('f_si_key');
  settings.silicon.baseUrl        = val('f_si_base') || DEFAULT_SETTINGS.silicon.baseUrl;
  settings.silicon.modelChat      = val('f_si_chat') || DEFAULT_SETTINGS.silicon.modelChat;
  settings.silicon.modelTranslate = val('f_si_trans') || DEFAULT_SETTINGS.silicon.modelTranslate;
  settings.silicon.modelTrade     = val('f_si_trade') || DEFAULT_SETTINGS.silicon.modelTrade;

  settings.prompts.chat      = val('f_p_chat')      || DEFAULT_SETTINGS.prompts.chat;
  settings.prompts.translate = val('f_p_translate') || DEFAULT_SETTINGS.prompts.translate;
  settings.prompts.trade     = val('f_p_trade')     || DEFAULT_SETTINGS.prompts.trade;

  localStorage.setItem(LS_KEY, JSON.stringify(settings));
  setStatus('已保存 ✓','ok');
  refreshBadge();
  refreshStatusLine();
  setTimeout(closeSettings, 600);
}
function val(id){ return (document.getElementById(id)?.value||'').trim(); }

// ── Settings UI ──
function openSettings(){
  const body = document.getElementById('settingsBody');
  body.innerHTML = renderSettingsForm();
  document.getElementById('settingsModal').classList.add('show');
  document.getElementById('settingsStatus').textContent = '';
  // 默认展开 SiliconFlow（核心）
  document.querySelector('.prov-sec[data-prov="silicon"]')?.classList.add('open');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('show'); }
function setStatus(t, kind){
  const el = document.getElementById('settingsStatus');
  el.textContent = t;
  el.style.color = kind==='ok' ? 'var(--success)' : kind==='err' ? 'var(--danger)' : 'var(--muted)';
}

function renderSettingsForm(){
  const s = settings;
  const provBlock = (key, title, fields, opened) => `
    <div class="prov-sec ${opened?'open':''}" data-prov="${key}">
      <div class="prov-head" onclick="this.parentElement.classList.toggle('open')">
        <span>${title} ${s[key].key ? '<span class="prov-status ok">已配置</span>' : '<span class="prov-status">未配置</span>'}</span>
        <span class="arrow">▼</span>
      </div>
      <div class="prov-body">${fields}</div>
    </div>`;

  const f = (id, label, value, ph, type='text', tip='') => `
    <div class="field">
      <label>${label}</label>
      <input id="${id}" type="${type}" value="${escAttr(value)}" placeholder="${escAttr(ph)}" autocomplete="off">
      ${tip ? `<small>${tip}</small>` : ''}
    </div>`;

  return `
    ${provBlock('silicon', '🇨🇳 SiliconFlow（国内模型 · 主力）', `
      ${f('f_si_key',  'API Key',  s.silicon.key,  'sk-... ', 'password')}
      ${f('f_si_base', 'Base URL', s.silicon.baseUrl, 'https://api.siliconflow.cn/v1')}
      <div class="field-row">

// ── Mode switching ──
function switchMode(mode){
  if(currentMode === mode) return;
  if(history.length > 0){
    if(!confirm(`切换到「${MODE_INFO[mode].name}」会清空当前对话历史，继续吗？`)) return;
  }
  currentMode = mode;
  history = [];
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===mode));
  document.getElementById('toolbarHint').textContent = MODE_INFO[mode].hint;
  document.getElementById('input').placeholder = MODE_INFO[mode].placeholder;
  refreshStatusLine();
  renderWelcome();
}

function renderWelcome(){
  const box = document.getElementById('messages');
  const m = MODE_INFO[currentMode];
  let welcome = '';
  if(currentMode==='chat') welcome = '你好！有什么可以帮你的？';
  else if(currentMode==='translate') welcome = '粘贴要翻译的内容，我会自动判断方向（中⇄英），只输出译文。';
  else if(currentMode==='trade') welcome = '告诉我你要写什么 —— 询价、报价、催款、PI 描述、客户跟进 …  我会写成专业英文。';
  box.innerHTML = `
    <div class="msg msg-bot">
      <div class="avatar">${m.icon}</div>
      <div class="bubble">${escHtml(welcome)}</div>
    </div>`;
}

function refreshStatusLine(){
  const m = MODE_INFO[currentMode];
  document.getElementById('curMode').textContent = m.name;
  let model = '—', prov = 'SiliconFlow';
  if(currentMode==='chat')      model = settings.silicon.modelChat;
  if(currentMode==='translate') model = settings.silicon.modelTranslate;
  if(currentMode==='trade')     model = settings.silicon.modelTrade;
  document.getElementById('curModel').textContent = model;
  document.getElementById('curProvider').textContent = prov;
  const dot = document.getElementById('statusDot');
  dot.classList.toggle('live', !!settings.silicon.key);
}

function refreshBadge(){
  const b = document.getElementById('providerBadge');
  const configured = [];
  if(settings.silicon.key) configured.push('SiliconFlow');
  if(settings.gpt.key)     configured.push('GPT');
  if(settings.claude.key)  configured.push('Claude');
  if(settings.gemini.key)  configured.push('Gemini');
  if(configured.length){
    b.textContent = '✓ ' + configured.join(' · ');
    b.classList.add('ok'); b.classList.remove('warn');
  } else {
    b.textContent = '未配置';
    b.classList.remove('ok'); b.classList.add('warn');
  }
}

// ── Chat ──
function clearChat(){ history = []; renderWelcome(); }
function copyLastReply(){
  const lastBot = [...history].reverse().find(m => m.role==='assistant');
  if(!lastBot){ toast('没有可复制的回复', 'err'); return; }
  navigator.clipboard.writeText(lastBot.content).then(() => toast('已复制 ✓','ok'));
}

function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; }
function onKeyDown(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }

function appendMsg(role, content, isPending){
  const box = document.getElementById('messages');
  const isBot = role==='assistant';
  const div = document.createElement('div');
  div.className = 'msg msg-' + (isBot?'bot':'user');
  const avatar = isBot ? MODE_INFO[currentMode].icon : '🧑';
  const inner = isPending
    ? `<div class="bubble thinking"><span class="dot-anim">●</span><span class="dot-anim">●</span><span class="dot-anim">●</span></div>`
    : `<div class="bubble">${isBot ? md2html(content) : escHtml(content)}</div>`;
  div.innerHTML = `<div class="avatar">${avatar}</div>${inner}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function send(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text) return;
  if(!settings.silicon.key){ toast('请先在设置里填写 SiliconFlow API Key','err'); openSettings(); return; }

  input.value=''; input.style.height='auto';
  document.getElementById('btnSend').disabled = true;

  appendMsg('user', text);
  history.push({ role:'user', content:text });
  const pending = appendMsg('assistant', '', true);

  try{
    const reply = await callSiliconFlow(currentMode, history);
    pending.remove();
    history.push({ role:'assistant', content:reply });
    appendMsg('assistant', reply);
  }catch(e){
    pending.remove();
    appendMsg('assistant', `⚠ 请求失败：${e.message}`);
    history.pop(); // 回滚 user
  }
  document.getElementById('btnSend').disabled = false;
  input.focus();
}

// ── Provider call: SiliconFlow (OpenAI compatible) ──
async function callSiliconFlow(mode, msgs){
  const s = settings.silicon;
  if(!s.key) throw new Error('SiliconFlow API Key 未配置');
  const model = mode==='translate' ? s.modelTranslate : mode==='trade' ? s.modelTrade : s.modelChat;
  const sysPrompt = settings.prompts[mode] || DEFAULT_SETTINGS.prompts[mode];

  const body = {
    model,
    messages: [{ role:'system', content:sysPrompt }, ...msgs],
    temperature: mode==='translate' ? 0.3 : 0.7,
    max_tokens: 4096,
    stream: false
  };

  const resp = await fetch(s.baseUrl.replace(/\/$/,'') + '/chat/completions', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer ' + s.key
    },
    body: JSON.stringify(body)
  });

  if(!resp.ok){
    let msg = `HTTP ${resp.status}`;
    try{ const e = await resp.json(); msg = e.error?.message || e.message || msg; }catch{}
    throw new Error(msg);
  }
  const data = await resp.json();
  const reply = data.choices?.[0]?.message?.content;
  if(!reply) throw new Error('空回复');
  return reply.trim();
}

// ── Utils ──
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }
function md2html(t){
  return escHtml(t)
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<strong>$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="font-size:15px">$1</strong>')
    .replace(/^# (.+)$/gm,'<strong style="font-size:16px">$1</strong>')
    .replace(/^\s*[-•]\s+(.+)$/gm,'<br>• $1')
    .replace(/^\d+\.\s+(.+)$/gm,'<br>$&')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}
function toast(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind||'');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Init ──
refreshBadge();
refreshStatusLine();
renderWelcome();
document.getElementById('input').focus();

// 第一次访问，没配置 key → 自动打开设置
if(!settings.silicon.key && !settings.gpt.key && !settings.claude.key && !settings.gemini.key){
  setTimeout(openSettings, 400);
}
