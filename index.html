<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XHON CRM — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0B1120;
      --panel:   #111827;
      --border:  rgba(255,255,255,.08);
      --primary: #00C46A;
      --cyan:    #22d3ee;
      --purple:  #8b5cf6;
      --text:    #f0f4ff;
      --muted:   #8892a4;
    }
    html, body {
      height: 100%; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text); overflow: hidden;
    }
    .page { display: flex; height: 100vh; }

    /* ── Left visual panel ── */
    .visual {
      flex: 1; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0d1526 0%, #0B1120 50%, #0a1020 100%);
      display: flex; align-items: center; justify-content: center;
    }
    /* animated grid */
    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,196,106,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,196,106,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift { to { transform: translateY(40px); } }

    /* glow orbs */
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(0,196,106,.12); top: -100px; left: -100px; animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 300px; height: 300px; background: rgba(34,211,238,.10); bottom: -80px; right: 80px; animation: float 11s ease-in-out infinite reverse; }
    .orb-3 { width: 200px; height: 200px; background: rgba(139,92,246,.10); top: 40%; right: -60px; animation: float 9s ease-in-out infinite 2s; }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-24px); }
    }

    /* world map dots */
    .world-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: .18; }
    .world-wrap svg { width: 90%; max-width: 600px; }

    /* floating stat cards */
    .float-cards { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 16px; }
    .fcard {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px; padding: 16px 22px; backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 16px; min-width: 230px;
      animation: slideIn .6s ease both;
    }
    .fcard:nth-child(1) { animation-delay: .1s; }
    .fcard:nth-child(2) { animation-delay: .25s; }
    .fcard:nth-child(3) { animation-delay: .4s; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .fcard-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: grid; place-items: center; font-size: 20px; flex-shrink: 0;
    }
    .fcard-icon.green  { background: rgba(0,196,106,.2); }
    .fcard-icon.cyan   { background: rgba(34,211,238,.2); }
    .fcard-icon.purple { background: rgba(139,92,246,.2); }
    .fcard-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .fcard-value { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .fcard-value.green  { color: var(--primary); }
    .fcard-value.cyan   { color: var(--cyan); }
    .fcard-value.purple { color: var(--purple); }

    /* brand on left */
    .vis-brand {
      position: absolute; top: 32px; left: 32px; z-index: 3;
      display: flex; align-items: center; gap: 12px;
    }
    .vis-logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--cyan));
      box-shadow: 0 0 20px rgba(0,196,106,.4);
      display: grid; place-items: center; font-size: 18px; font-weight: 800; color: #000;
    }
    .vis-name { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    .vis-name span { color: var(--primary); }

    .vis-tagline {
      position: absolute; bottom: 32px; left: 32px; right: 32px; z-index: 3;
      color: var(--muted); font-size: 13px; line-height: 1.7;
    }

    /* ── Right login panel ── */
    .login-panel {
      width: 420px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--panel); border-left: 1px solid var(--border);
      padding: 40px;
    }
    .login-box { width: 100%; }

    .login-box h2 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .login-box p  { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px;
    }
    .field input {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px; color: var(--text);
      font-size: 15px; outline: none; transition: .2s;
    }
    .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,196,106,.15); }

    .btn-login {
      width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; letter-spacing: .3px;
      background: linear-gradient(135deg, var(--primary), #00a857);
      color: #000; transition: .2s; margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,196,106,.3); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(251,113,133,.12); border: 1px solid rgba(251,113,133,.3);
      border-radius: 10px; padding: 11px 14px; color: #fb7185;
      font-size: 13px; margin-top: 14px; display: none;
    }
    .error-msg.show { display: block; }

    .login-footer {
      margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);
      text-align: center; color: var(--muted); font-size: 12px;
    }

    /* spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.3); border-top-color: #000; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 840px) {
      .visual { display: none; }
      .login-panel { width: 100%; border: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── Left Visual ── -->
  <div class="visual">
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="world-wrap">
      <svg viewBox="0 0 1000 500" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- simplified continent dots pattern -->
        <g fill="rgba(0,196,106,1)" opacity=".7">
          <!-- North America -->
          <rect x="120" y="80"  width="6" height="6" rx="1"/><rect x="140" y="90"  width="5" height="5" rx="1"/><rect x="160" y="100" width="6" height="6" rx="1"/><rect x="170" y="115" width="5" height="5" rx="1"/><rect x="150" y="120" width="6" height="6" rx="1"/><rect x="130" y="110" width="5" height="5" rx="1"/><rect x="185" y="130" width="6" height="6" rx="1"/><rect x="200" y="145" width="5" height="5" rx="1"/><rect x="180" y="155" width="6" height="6" rx="1"/><rect x="165" y="165" width="5" height="5" rx="1"/>
          <!-- South America -->
          <rect x="210" y="220" width="6" height="6" rx="1"/><rect x="225" y="235" width="5" height="5" rx="1"/><rect x="215" y="250" width="6" height="6" rx="1"/><rect x="230" y="265" width="5" height="5" rx="1"/><rect x="220" y="280" width="6" height="6" rx="1"/><rect x="210" y="295" width="5" height="5" rx="1"/>
          <!-- Europe -->
          <rect x="450" y="80"  width="5" height="5" rx="1"/><rect x="465" y="70"  width="6" height="6" rx="1"/><rect x="480" y="80"  width="5" height="5" rx="1"/><rect x="470" y="95"  width="6" height="6" rx="1"/><rect x="455" y="100" width="5" height="5" rx="1"/><rect x="490" y="90"  width="6" height="6" rx="1"/>
          <!-- Africa -->
          <rect x="460" y="180" width="6" height="6" rx="1"/><rect x="475" y="195" width="5" height="5" rx="1"/><rect x="465" y="210" width="6" height="6" rx="1"/><rect x="480" y="225" width="5" height="5" rx="1"/><rect x="470" y="240" width="6" height="6" rx="1"/><rect x="460" y="255" width="5" height="5" rx="1"/><rect x="475" y="270" width="6" height="6" rx="1"/>
          <!-- Asia -->
          <rect x="580" y="80"  width="6" height="6" rx="1"/><rect x="600" y="70"  width="5" height="5" rx="1"/><rect x="620" y="80"  width="6" height="6" rx="1"/><rect x="640" y="90"  width="5" height="5" rx="1"/><rect x="660" y="100" width="6" height="6" rx="1"/><rect x="680" y="110" width="5" height="5" rx="1"/><rect x="620" y="110" width="6" height="6" rx="1"/><rect x="600" y="125" width="5" height="5" rx="1"/><rect x="640" y="130" width="6" height="6" rx="1"/><rect x="700" y="120" width="5" height="5" rx="1"/><rect x="720" y="130" width="6" height="6" rx="1"/><rect x="710" y="145" width="5" height="5" rx="1"/><rect x="730" y="155" width="6" height="6" rx="1"/>
          <!-- China area -->
          <rect x="660" y="140" width="6" height="6" rx="1"/><rect x="680" y="150" width="5" height="5" rx="1"/><rect x="670" y="165" width="6" height="6" rx="1"/><rect x="690" y="160" width="5" height="5" rx="1"/><rect x="700" y="175" width="6" height="6" rx="1"/>
          <!-- Australia -->
          <rect x="740" y="300" width="6" height="6" rx="1"/><rect x="760" y="290" width="5" height="5" rx="1"/><rect x="780" y="300" width="6" height="6" rx="1"/><rect x="770" y="315" width="5" height="5" rx="1"/><rect x="750" y="320" width="6" height="6" rx="1"/><rect x="760" y="330" width="5" height="5" rx="1"/>
        </g>
        <!-- connection arcs -->
        <g stroke="rgba(0,196,106,.25)" stroke-width="1" fill="none">
          <path d="M 165 130 Q 350 20  660 150"/>
          <path d="M 220 240 Q 400 180 470 200"/>
          <path d="M 475 200 Q 580 160 680 155"/>
          <path d="M 690 165 Q 720 220 755 305"/>
        </g>
        <!-- pulsing dots on arcs -->
        <circle cx="400" cy="55"  r="3" fill="var(--primary)" opacity=".9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
        <circle cx="580" cy="190" r="3" fill="#22d3ee" opacity=".9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" repeatCount="indefinite" begin=".5s"/></circle>
        <circle cx="720" cy="235" r="3" fill="#8b5cf6" opacity=".9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite" begin="1s"/></circle>
      </svg>
    </div>

    <div class="vis-brand">
      <div class="vis-logo">X</div>
      <div class="vis-name">XHON <span>CRM</span></div>
    </div>

    <div class="float-cards">
      <div class="fcard">
        <div class="fcard-icon green">📦</div>
        <div>
          <div class="fcard-label">Monthly Orders</div>
          <div class="fcard-value green" id="vc-orders">—</div>
        </div>
      </div>
      <div class="fcard">
        <div class="fcard-icon cyan">💰</div>
        <div>
          <div class="fcard-label">Monthly Sales</div>
          <div class="fcard-value cyan" id="vc-sales">—</div>
        </div>
      </div>
      <div class="fcard">
        <div class="fcard-icon purple">📈</div>
        <div>
          <div class="fcard-label">Monthly Profit</div>
          <div class="fcard-value purple" id="vc-profit">—</div>
        </div>
      </div>
    </div>

    <div class="vis-tagline">
      Professional Foreign Trade Management System<br>
      专业外贸订单管理系统
    </div>
  </div>

  <!-- ── Right Login Panel ── -->
  <div class="login-panel">
    <div class="login-box">
      <div style="margin-bottom:32px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <div class="vis-logo" style="width:36px;height:36px;font-size:16px">X</div>
          <span style="font-size:16px;font-weight:600;color:var(--muted)">XHON CRM</span>
        </div>
        <h2>Welcome back</h2>
        <p>Sign in to your dashboard</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <div class="login-footer">
        XHON Foreign Trade CRM &nbsp;·&nbsp; Single User Mode<br>
        <span style="color:rgba(255,255,255,.25)">v2.0 — 2025</span>
      </div>
    </div>
  </div>

</div>

<script>
  // If already logged in, redirect
  if (localStorage.getItem('crm_token')) {
    location.href = '/dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      localStorage.setItem('crm_token', data.token);
      localStorage.setItem('crm_username', data.username);
      location.href = '/dashboard.html';
    } catch (error) {
      err.textContent = error.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  });

  // Load preview stats (no auth needed for public stats)
  (async () => {
    try {
      const token = localStorage.getItem('crm_token');
      if (!token) return;
      const res = await fetch('/api/dashboard/stats', {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (!res.ok) return;
      const d = await res.json();
      const fmt = n => '$' + Number(n||0).toLocaleString(undefined, {maximumFractionDigits:0});
      document.getElementById('vc-orders').textContent  = d.month_orders  || 0;
      document.getElementById('vc-sales').textContent   = fmt(d.month_sales);
      document.getElementById('vc-profit').textContent  = fmt(d.month_profit);
    } catch {}
  })();
</script>
</body>
</html>
