<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常用密码存储 - TPKELE CRM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#030712;--panel:#0d1424;--border:rgba(0,180,255,.14);--text:#e2e8f0;--muted:#94a3b8;--primary:#00c8ff;--green:#4ade80;--danger:#f87171}
html,body{height:100%;font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text)}
a{color:inherit;text-decoration:none}
.header{height:58px;display:flex;align-items:center;gap:16px;padding:0 22px;border-bottom:1px solid var(--border);background:rgba(3,7,18,.97);position:sticky;top:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:rgba(0,180,255,.04);color:var(--muted);font-size:13px}
.header-title{font-size:16px;font-weight:700}
.header-right{margin-left:auto;display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-size:13px;cursor:pointer}
.btn:hover{border-color:rgba(0,200,255,.35);background:rgba(0,180,255,.06)}
.btn-primary{background:linear-gradient(135deg,#005f90,#008fba);border-color:rgba(0,200,255,.4);color:#fff;font-weight:600}
.main{max-width:980px;margin:0 auto;padding:22px 18px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.panel-title{font-size:15px;font-weight:700;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--muted)}
.field input{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);outline:none}
.field input:focus{border-color:rgba(0,200,255,.4)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:220px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text)}
.count{font-size:12px;color:var(--muted);margin-left:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:12px}
.card h4{font-size:14px;margin-bottom:8px}
.meta{font-size:12px;color:var(--muted);line-height:1.6}
.mask{font-family:monospace;font-size:14px;color:#f8fafc;margin:8px 0}
.link{color:#67e8f9;text-decoration:underline;word-break:break-all}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 14px;border-radius:8px;font-size:12px;display:none}
.toast.show{display:block}
.toast.ok{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#86efac}
.toast.err{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:#fca5a5}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
.modal.show{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:420px;width:100%}
.modal-box h3{margin-bottom:10px}
.modal-box p{font-size:12px;color:var(--muted);margin-bottom:10px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<header class="header">
  <a href="dashboard.html" class="back-btn">← 返回</a>
  <div class="header-title">常用密码存储</div>
  <div class="header-right">
    <button class="btn" onclick="openSecurityModal()">安全设置</button>
  </div>
</header>

<div class="main">
  <section class="panel">
    <div class="panel-title">新增密码</div>
    <div class="grid">
      <div class="field"><label>用途名称 *</label><input id="f-name" placeholder="例如：企业微信"></div>
      <div class="field"><label>平台/网站</label><input id="f-platform" placeholder="例如：https://work.weixin.qq.com"></div>
      <div class="field"><label>账号 *</label><input id="f-account" placeholder="例如：admin@xx.com"></div>
      <div class="field"><label>密码 *</label><input id="f-password" type="password" placeholder="请输入密码"></div>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="btn btn-primary" onclick="createItem()">新增密码</button>
    </div>
  </section>

  <section class="panel">
    <div class="panel-title">查看密码（搜索式）</div>
    <div class="row" style="margin-bottom:12px">
      <input id="searchInput" class="search" placeholder="输入用途/平台/账号关键词" oninput="renderCards()">
      <span id="countLabel" class="count"></span>
    </div>
    <div id="resultCards" class="cards"></div>
  </section>
</div>

<div id="verifyModal" class="modal">
  <div class="modal-box">
    <h3>二次验证</h3>
    <p>请输入二次验证密码后查看明文</p>
    <input id="verifyPassword" type="password" style="width:100%;margin-bottom:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text)">
    <div class="row" style="justify-content:flex-end">
      <button class="btn" onclick="closeVerifyModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmReveal()">确认</button>
    </div>
  </div>
</div>

<div id="securityModal" class="modal">
  <div class="modal-box">
    <h3>设置二次验证密码</h3>
    <p>首次设置不用填旧密码，修改时需要旧密码</p>
    <input id="oldSecondPassword" type="password" placeholder="旧二次验证密码（首次可空）" style="width:100%;margin-bottom:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text)">
    <input id="newSecondPassword" type="password" placeholder="新二次验证密码" style="width:100%;margin-bottom:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text)">
    <div class="row" style="justify-content:flex-end">
      <button class="btn" onclick="closeSecurityModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSecondPassword()">保存</button>
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('crm_token');
if (!TOKEN) location.href = 'login.html';
let state = { items: [], revealId: null };

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, ...(opts.headers || {}) },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function toast(msg, type = 'ok') { const el = document.getElementById('toast'); el.className = 'toast show ' + type; el.textContent = msg; setTimeout(() => el.className = 'toast', 2800); }

function normalizePlatform(p) {
  const t = String(p || '').trim();
  if (!t) return '';
  return /^https?:\/\//i.test(t) ? t : ('https://' + t);
}

async function loadItems() {
  state.items = await api('/api/password-vault/items');
  renderCards();
}

function renderCards() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const rows = q ? state.items.filter(i => [i.name, i.platform, i.account].join(' ').toLowerCase().includes(q)) : state.items;
  document.getElementById('countLabel').textContent = `${rows.length} 条`;
  const box = document.getElementById('resultCards');
  if (!rows.length) { box.innerHTML = '<div class="meta">暂无匹配数据</div>'; return; }
  box.innerHTML = rows.map(i => {
    const url = normalizePlatform(i.platform);
    const linkHtml = i.platform ? `<a class="link" href="${esc(url)}" target="_blank">${esc(i.platform)}</a>` : '—';
    return `<div class="card">
      <h4>${esc(i.name)}</h4>
      <div class="meta">账号：${esc(i.account)}</div>
      <div class="meta">平台：${linkHtml}</div>
      <div class="mask">密码：${i.password_masked || '************'}</div>
      <div class="row" style="justify-content:flex-end">
        <button class="btn" onclick="openVerifyModal('${i.id}')">查看密码</button>
      </div>
    </div>`;
  }).join('');
}

async function createItem() {
  const payload = {
    name: document.getElementById('f-name').value.trim(),
    platform: document.getElementById('f-platform').value.trim(),
    account: document.getElementById('f-account').value.trim(),
    password: document.getElementById('f-password').value,
  };
  if (!payload.name || !payload.account || !payload.password) { toast('请填写必填字段', 'err'); return; }
  await api('/api/password-vault/items', { method: 'POST', body: JSON.stringify(payload) });
  document.getElementById('f-name').value = '';
  document.getElementById('f-platform').value = '';
  document.getElementById('f-account').value = '';
  document.getElementById('f-password').value = '';
  toast('保存成功');
  await loadItems();
}

function openVerifyModal(id) { state.revealId = id; document.getElementById('verifyPassword').value = ''; document.getElementById('verifyModal').classList.add('show'); }
function closeVerifyModal() { document.getElementById('verifyModal').classList.remove('show'); }

async function confirmReveal() {
  const secondPassword = document.getElementById('verifyPassword').value;
  if (!secondPassword) { toast('请输入二次验证密码', 'err'); return; }
  const res = await api('/api/password-vault/items/' + state.revealId + '/reveal', {
    method: 'POST',
    body: JSON.stringify({ secondPassword }),
  });
  closeVerifyModal();
  alert('明文密码：' + res.password + '\n\n将在 ' + (res.visibleSeconds || 15) + ' 秒后自动失效，请谨慎使用。');
}

function openSecurityModal() { document.getElementById('securityModal').classList.add('show'); }
function closeSecurityModal() { document.getElementById('securityModal').classList.remove('show'); }

async function saveSecondPassword() {
  const oldPassword = document.getElementById('oldSecondPassword').value;
  const newPassword = document.getElementById('newSecondPassword').value;
  if (!newPassword || newPassword.length < 4) { toast('新密码至少4位', 'err'); return; }
  await api('/api/password-vault/security/second-password', {
    method: 'POST',
    body: JSON.stringify({ oldPassword, newPassword }),
  });
  document.getElementById('oldSecondPassword').value = '';
  document.getElementById('newSecondPassword').value = '';
  closeSecurityModal();
  toast('二次验证密码已保存');
}

window.addEventListener('click', (e) => {
  if (e.target.id === 'verifyModal') closeVerifyModal();
  if (e.target.id === 'securityModal') closeSecurityModal();
});

loadItems().catch(e => toast(e.message, 'err'));
</script>
</body>
</html>
