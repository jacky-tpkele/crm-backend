<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPKELE CRM - 网站询盘</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000509;--panel:#060f20;--panel2:#0a1628;
  --border:rgba(0,190,255,0.12);--border-h:rgba(0,220,255,0.38);
  --text:#ddf0ff;--muted:#4d7390;--muted2:#7aa4c0;
  --primary:#00c8f0;
  --danger:#fb7185;--success:#4ade80;--warning:#fbbf24;
  --shadow:0 20px 60px rgba(0,0,0,.7);--radius:14px;--sb:220px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,190,255,.18);border-radius:4px}

.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sb);flex-shrink:0;height:100%;background:linear-gradient(180deg,rgba(3,8,20,.99),rgba(2,5,13,.99));border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:20}
.sb-logo{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-icon{width:36px;height:36px;flex-shrink:0;display:grid;place-items:center}
.logo-text{font-size:15px;font-weight:700;white-space:nowrap;letter-spacing:1px}
.logo-text span{color:var(--primary)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:.15s;white-space:nowrap;color:var(--muted2);font-size:13.5px;font-weight:500;border-left:3px solid transparent}
.nav-item:hover{background:rgba(0,190,255,.05);color:var(--text)}
.nav-item.active{background:rgba(0,190,255,.08);color:var(--primary);border-left-color:var(--primary)}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-group{padding:8px 16px 4px;font-size:10px;font-weight:600;color:rgba(0,190,255,.4);text-transform:uppercase;letter-spacing:.8px}

/* ── Main shell ── */
.main{flex:1;display:flex;overflow:hidden}

/* ── List panel ── */
.list-panel{width:420px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--panel)}
.list-header{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.list-title-row{display:flex;align-items:center;justify-content:space-between}
.list-title{font-size:15px;font-weight:600}
.list-count{font-size:12px;color:var(--muted)}
.btn-refresh{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.15s}
.btn-refresh:hover{border-color:var(--primary);color:var(--primary)}
.btn-refresh.syncing{opacity:.6;pointer-events:none}

.search-row{display:flex;gap:8px}
.search-input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:.15s}
.search-input:focus{border-color:var(--primary)}
.search-input::placeholder{color:var(--muted)}
.status-filter{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;cursor:pointer;min-width:110px}
.status-filter:focus{border-color:var(--primary)}

.list-body{flex:1;overflow-y:auto}
.inq-item{padding:14px 16px;border-bottom:1px solid rgba(0,190,255,.06);cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:6px}
.inq-item:hover{background:rgba(0,190,255,.04)}
.inq-item.active{background:rgba(0,190,255,.08);border-left:3px solid var(--primary)}
.inq-item.new{font-weight:500}
.inq-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.inq-name{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.inq-date{font-size:11px;color:var(--muted);flex-shrink:0}
.inq-email{font-size:12px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inq-subject{font-size:12.5px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inq-meta-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.badge-new{background:rgba(0,200,240,.15);color:var(--primary);border:1px solid rgba(0,200,240,.35)}
.badge-contacted{background:rgba(251,191,36,.12);color:var(--warning);border:1px solid rgba(251,191,36,.35)}
.badge-quoted{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.35)}
.badge-converted{background:rgba(74,222,128,.12);color:var(--success);border:1px solid rgba(74,222,128,.35)}
.badge-closed{background:rgba(120,140,160,.12);color:var(--muted2);border:1px solid rgba(120,140,160,.3)}
.badge-product{background:rgba(0,190,255,.08);color:var(--muted2);border:1px solid var(--border);font-weight:500}

.list-empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px}
.list-loading{padding:30px;text-align:center;color:var(--muted);font-size:13px}

/* ── Detail panel ── */
.detail-panel{flex:1;display:flex;flex-direction:column;background:#ffffff;color:#1f2937;min-width:0}
.detail-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:12px}
.detail-placeholder svg{opacity:.3}

.detail-header{padding:22px 28px 16px;border-bottom:1px solid #e5e7eb;background:#ffffff;flex-shrink:0}
.detail-subject{font-size:20px;font-weight:600;color:#111827;margin-bottom:14px;line-height:1.4}
.detail-meta-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 18px;font-size:13.5px;color:#374151}
.detail-meta-grid .lbl{color:#6b7280;font-weight:500;white-space:nowrap}
.detail-meta-grid .val{color:#111827;word-break:break-all}
.detail-meta-grid .val a{color:#2563eb;text-decoration:none}
.detail-meta-grid .val a:hover{text-decoration:underline}

.detail-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn-action{padding:8px 16px;border-radius:8px;border:1px solid #d1d5db;background:#ffffff;color:#374151;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;font-weight:500}
.btn-action:hover{background:#f9fafb;border-color:#9ca3af;color:#111827}
.btn-action.primary{background:#2563eb;color:#ffffff;border-color:#2563eb}
.btn-action.primary:hover{background:#1d4ed8;border-color:#1d4ed8;color:#ffffff}
.btn-action.success{background:#16a34a;color:#ffffff;border-color:#16a34a}
.btn-action.success:hover{background:#15803d;border-color:#15803d;color:#ffffff}
.btn-action.danger{border-color:#fca5a5;color:#dc2626}
.btn-action.danger:hover{background:#fef2f2;border-color:#dc2626;color:#b91c1c}

.detail-body{flex:1;overflow-y:auto;padding:24px 28px;background:#ffffff}
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.detail-message{padding:16px 18px;background:#f9fafb;border-left:3px solid #2563eb;border-radius:6px;font-size:14px;line-height:1.7;color:#1f2937;white-space:pre-wrap;word-wrap:break-word}
.status-row{display:flex;align-items:center;gap:10px}
.status-select{padding:8px 14px;border-radius:7px;border:1px solid #d1d5db;background:#ffffff;color:#111827;font-size:13.5px;outline:none;cursor:pointer;font-weight:500}
.status-select:focus{border-color:#2563eb}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);display:none;align-items:center;gap:10px;box-shadow:var(--shadow)}
.toast.show{display:flex}
.toast.ok{border-color:rgba(74,222,128,.35)}
.toast.err{border-color:rgba(251,113,133,.35)}

@media (max-width:1000px){
  .list-panel{width:300px}
}
</style>
</head>
<body data-auth-required>

<div class="app">
  <div id="sidebar"></div>

  <div class="main">
    <!-- Inquiry list -->
    <div class="list-panel">
      <div class="list-header">
        <div class="list-title-row">
          <span class="list-title">📋 网站询盘</span>
          <button class="btn-refresh" id="btnRefresh" onclick="loadInquiries()">🔄 刷新</button>
        </div>
        <div class="search-row">
          <input class="search-input" id="search" placeholder="搜索客户/邮箱/主题…" oninput="renderList()">
          <select class="status-filter" id="statusFilter" onchange="renderList()">
            <option value="">全部状态</option>
            <option value="new">🆕 新询盘</option>
            <option value="contacted">📞 已联系</option>
            <option value="quoted">💰 已报价</option>
            <option value="converted">✅ 已转单</option>
            <option value="closed">⛔ 已关闭</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--muted)">
          <span id="listCount">—</span>
          <span id="listNote">仅显示网站表单提交</span>
        </div>
      </div>
      <div class="list-body" id="listBody">
        <div class="list-loading">加载中…</div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-placeholder">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span>选择一条询盘查看详情</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="_shared/layout.js"></script>
<script>
const STATUS_OPTIONS = [
  { value: 'new',       label: '🆕 新询盘',  cls: 'badge-new' },
  { value: 'contacted', label: '📞 已联系',  cls: 'badge-contacted' },
  { value: 'quoted',    label: '💰 已报价',  cls: 'badge-quoted' },
  { value: 'converted', label: '✅ 已转单',  cls: 'badge-converted' },
  { value: 'closed',    label: '⛔ 已关闭',  cls: 'badge-closed' },
];
const STATUS_MAP = Object.fromEntries(STATUS_OPTIONS.map(s => [s.value, s]));

let inquiries = [];
let currentId = null;

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return '今天 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }
  if ((now - d) / 86400000 < 7) {
    return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  }
  return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
}

function fmtFullDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-CN');
}

// ── 加载询盘 ──
async function loadInquiries() {
  const btn = document.getElementById('btnRefresh');
  const body = document.getElementById('listBody');
  btn.classList.add('syncing');
  body.innerHTML = '<div class="list-loading">加载中…</div>';
  try {
    const data = await CRM.api('/api/inquiries');
    // 只显示网站来源
    inquiries = (Array.isArray(data) ? data : []).filter(i => i.source === 'website');
    renderList();
  } catch (e) {
    body.innerHTML = `<div class="list-empty">加载失败：${esc(e.message)}</div>`;
  } finally {
    btn.classList.remove('syncing');
  }
}

function renderList() {
  const q  = document.getElementById('search').value.trim().toLowerCase();
  const st = document.getElementById('statusFilter').value;
  const rows = inquiries.filter(i => {
    const hay = [i.customer_name, i.email, i.subject, i.product_interest, i.message].filter(Boolean).join(' ').toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (st && (i.status || 'new') !== st) return false;
    return true;
  });
  const body = document.getElementById('listBody');
  document.getElementById('listCount').textContent = rows.length ? `共 ${rows.length} 条` : '暂无';
  if (!rows.length) {
    body.innerHTML = '<div class="list-empty">📭 暂无网站询盘</div>';
    return;
  }
  body.innerHTML = rows.map(i => {
    const st = STATUS_MAP[i.status] || STATUS_MAP.new;
    const isActive = i.id === currentId;
    return `
      <div class="inq-item ${isActive ? 'active' : ''} ${i.status === 'new' || !i.status ? 'new' : ''}"
           data-id="${i.id}" onclick="openInquiry('${i.id}', this)">
        <div class="inq-row">
          <span class="inq-name">${esc(i.customer_name || '(无名)')}</span>
          <span class="inq-date">${fmtDate(i.created_at || i.inquiry_date)}</span>
        </div>
        <div class="inq-email">${esc(i.email || '—')}</div>
        <div class="inq-subject">${esc(i.subject || i.notes?.split('\n')[0] || '—')}</div>
        <div class="inq-meta-row">
          <span class="badge ${st.cls}">${st.label}</span>
          ${i.product_interest ? `<span class="badge badge-product">${esc(i.product_interest)}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── 打开询盘详情 ──
function openInquiry(id, el) {
  currentId = id;
  document.querySelectorAll('.inq-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');

  const i = inquiries.find(x => x.id === id);
  if (!i) return;
  const st = STATUS_MAP[i.status] || STATUS_MAP.new;

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-subject">${esc(i.subject || '(无主题)')}</div>
      <div class="detail-meta-grid">
        <span class="lbl">客户姓名</span><span class="val">${esc(i.customer_name || '—')}</span>
        <span class="lbl">邮箱</span>
        <span class="val">${i.email ? `<a href="mailto:${esc(i.email)}">${esc(i.email)}</a>` : '—'}</span>
        ${i.product_interest ? `<span class="lbl">感兴趣产品</span><span class="val">${esc(i.product_interest)}</span>` : ''}
        <span class="lbl">收到时间</span><span class="val">${fmtFullDate(i.created_at || i.inquiry_date)}</span>
        <span class="lbl">状态</span>
        <span class="val">
          <span class="status-row">
            <select class="status-select" id="statusSelect" onchange="updateStatus('${i.id}', this.value)">
              ${STATUS_OPTIONS.map(o => `<option value="${o.value}" ${(i.status || 'new') === o.value ? 'selected' : ''}>${o.label}</option>`).join('')}
            </select>
          </span>
        </span>
      </div>
      <div class="detail-actions">
        <button class="btn-action primary" onclick="replyByEmail('${i.id}')">✉ 写邮件回复</button>
        <button class="btn-action" onclick="copyEmail('${esc(i.email || '')}')">📋 复制邮箱</button>
        <button class="btn-action success" onclick="convertToOrder('${i.id}')">→ 转为订单</button>
        <button class="btn-action danger" onclick="deleteInquiry('${i.id}')">🗑 删除</button>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-section-title">询盘内容</div>
        <div class="detail-message">${esc(i.message || i.notes || '(无内容)')}</div>
      </div>
    </div>`;
}

// ── 修改状态 ──
async function updateStatus(id, status) {
  try {
    await CRM.api(`/api/inquiries/${id}`, { method: 'PUT', body: JSON.stringify({ status, updated_at: new Date().toISOString() }) });
    const idx = inquiries.findIndex(x => x.id === id);
    if (idx >= 0) inquiries[idx].status = status;
    CRM.showToast('状态已更新', 'ok');
    renderList();
  } catch (e) {
    CRM.showToast('更新失败：' + e.message, 'err');
  }
}

// ── 回复邮件（跳转到邮件页 compose） ──
function replyByEmail(id) {
  const i = inquiries.find(x => x.id === id);
  if (!i) return;
  if (!i.email) { CRM.showToast('该询盘无邮箱地址', 'err'); return; }
  const subject = i.subject ? (i.subject.startsWith('Re:') ? i.subject : `Re: ${i.subject}`) : `Re: 您的询盘`;
  const greet = i.customer_name ? `Dear ${i.customer_name},\n\n` : 'Hello,\n\n';
  const body  = `${greet}Thank you for your inquiry. ${i.product_interest ? `Regarding ${i.product_interest}, ` : ''}\n\nBest regards,\nTPKELE`;
  const url = `email.html?compose=1&to=${encodeURIComponent(i.email)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  // 自动把状态设为 contacted（如果原本是 new）
  if ((i.status || 'new') === 'new') {
    updateStatus(id, 'contacted').catch(() => {});
  }
  window.open(url, '_blank');
}

function copyEmail(email) {
  if (!email) { CRM.showToast('无邮箱可复制', 'err'); return; }
  navigator.clipboard.writeText(email).then(
    () => CRM.showToast('邮箱已复制', 'ok'),
    () => CRM.showToast('复制失败', 'err'),
  );
}

function convertToOrder(id) {
  const i = inquiries.find(x => x.id === id);
  if (!i) return;
  if (!confirm(`确认把这条询盘转为订单？\n客户：${i.customer_name}\n\n会跳到订单页面继续填写。`)) return;
  // 把状态先标记为 converted
  updateStatus(id, 'converted').catch(() => {});
  // 跳到 dashboard 的订单页（携带客户名）
  sessionStorage.setItem('pendingOrderCustomer', i.customer_name || '');
  location.href = 'dashboard.html#orders';
}

async function deleteInquiry(id) {
  if (!confirm('确定删除这条询盘吗？此操作不可撤销。')) return;
  try {
    await CRM.api(`/api/inquiries/${id}`, { method: 'DELETE' });
    inquiries = inquiries.filter(x => x.id !== id);
    if (currentId === id) {
      currentId = null;
      showPlaceholder();
    }
    renderList();
    CRM.showToast('已删除', 'ok');
  } catch (e) {
    CRM.showToast('删除失败：' + e.message, 'err');
  }
}

function showPlaceholder() {
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-placeholder">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      <span>选择一条询盘查看详情</span>
    </div>`;
}

// ── Init ──
CRM.mountSidebar('inquiries');
loadInquiries();

// 30 秒自动刷新一次（捕获新询盘）
setInterval(() => {
  if (!document.hidden) loadInquiries();
}, 30000);
</script>
</body>
</html>
