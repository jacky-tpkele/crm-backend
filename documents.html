<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPKELE CRM - Documents</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="_shared/layout.css">
<style>
.controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.field select,.field input{min-width:160px}
.field select option{background:var(--panel)}

/* Preview area */
.preview-wrap{padding:24px;display:flex;justify-content:center;padding-right:200px}
.preview-paper{background:#fff;color:#000;width:800px;max-width:100%;padding:28px;box-shadow:0 4px 32px rgba(0,0,0,.6);font-family:Arial,sans-serif;font-size:12px;line-height:1.4}
.preview-paper *{color:#000}

/* Right-side floating toolbar */
.table-toolbar{position:fixed;right:20px;top:50%;transform:translateY(-50%);width:150px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;display:none;flex-direction:column;gap:6px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.5);max-height:80vh;overflow-y:auto}
.table-toolbar.show{display:flex}
.table-toolbar h4{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 2px;padding-top:6px;border-top:1px solid var(--border)}
.table-toolbar h4:first-child{border-top:none;padding-top:0}
.tb-btn{width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:11.5px;cursor:pointer;transition:.15s;text-align:left;white-space:nowrap}
.tb-btn:hover{border-color:var(--p1);color:var(--p1);background:rgba(16,185,129,.06)}
.tb-btn.danger{color:var(--danger);border-color:rgba(251,113,133,.3)}
.tb-btn.danger:hover{background:rgba(251,113,133,.08)}
.tb-btn.primary{background:var(--p1);color:#000;border-color:var(--p1);font-weight:600}
.tb-btn.primary:hover{background:#34D399}

/* 多选高亮 */
td.cell-selected, th.cell-selected{outline:2px solid #00aaff;outline-offset:-2px;background:rgba(0,170,255,.18) !important}

/* Editable cells */
[contenteditable="true"]{outline:none;cursor:text;min-width:16px;transition:background .15s}
[contenteditable="true"]:empty:before{content:attr(data-ph);color:#aaa;font-style:italic}
[contenteditable="true"]:hover{background:rgba(0,120,200,0.07)}
[contenteditable="true"]:focus{background:rgba(0,120,200,0.12);outline:1px dashed rgba(0,100,180,0.45)}

.del-col{border:none !important;padding:2px !important;width:22px !important;background:transparent !important}
.del-row-btn{display:none;width:18px;height:18px;line-height:16px;text-align:center;background:#e53;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;font-weight:bold;padding:0}
tr:hover .del-row-btn{display:inline-block}

.action-bar{display:flex;gap:10px;padding:0 24px 18px;justify-content:center;flex-wrap:wrap}
.action-bar .btn{font-size:13px;padding:8px 18px}
</style>
</head>
<body data-auth-required>
<div class="app">

<!-- Sidebar -->
<div id="sidebar"></div>

<!-- Main -->
<div class="main">
  <header class="header">
    <h1 data-i18n="pageTitle">Documents</h1>
    <button class="lang-btn" onclick="toggleLang()" id="langToggle">ZH</button>
  </header>

  <div class="workspace">
    <!-- Controls -->
    <div class="card">
      <div class="card-title" data-i18n="ctrlTitle">Generate Document</div>
      <div class="controls">
        <div class="field">
          <label data-i18n="lblOrder">Order</label>
          <select id="selOrder"><option value="">-- Select Order --</option></select>
        </div>
        <div class="field">
          <label data-i18n="lblDocType">Document Type</label>
          <select id="selDocType">
            <option value="quotation">Quotation</option>
            <option value="pi">Proforma Invoice (PI)</option>
            <option value="packing">Packing List</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="lblDocLang">Language</label>
          <select id="selDocLang">
            <option value="en">English</option>
            <option value="zh">Chinese</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="generateDoc()" data-i18n="btnGenerate">Generate</button>
      </div>
    </div>

    <!-- Right-side floating table toolbar -->
    <div class="table-toolbar" id="tableToolbar">
      <h4 data-i18n="tbFile">文件</h4>
      <button class="tb-btn primary" onclick="downloadPDF()" data-i18n="btnDownload">⬇ 下载 PDF</button>
      <button class="tb-btn" onclick="toggleEdit()" id="btnEdit" data-i18n="btnEdit">✏ 编辑模式</button>
      <h4 data-i18n="tbRows">行操作</h4>
      <button class="tb-btn" onclick="addRow()">＋ 添加行</button>
      <button class="tb-btn" onclick="insertRowAbove()">↑ 上方插入行</button>
      <button class="tb-btn" onclick="insertRowBelow()">↓ 下方插入行</button>
      <button class="tb-btn danger" onclick="deleteRow()">✕ 删除当前行</button>
      <h4 data-i18n="tbCols">列操作</h4>
      <button class="tb-btn" onclick="insertColLeft()">← 左侧插入列</button>
      <button class="tb-btn" onclick="insertColRight()">→ 右侧插入列</button>
      <button class="tb-btn danger" onclick="deleteCol()">✕ 删除当前列</button>
      <h4 data-i18n="tbMerge">合并/拆分</h4>
      <div style="font-size:10px;color:var(--muted);line-height:1.4;padding:0 2px 2px">按住 Shift 点击多个单元格后再按合并</div>
      <button class="tb-btn" onclick="mergeCells()">⊞ 合并选中</button>
      <button class="tb-btn" onclick="splitCell()">⊟ 拆分单元格</button>
      <button class="tb-btn" onclick="clearSelection()">○ 取消选择</button>
      <h4 data-i18n="tbOther">其他</h4>
      <button class="tb-btn" onclick="clearCell()">⌫ 清空单元格</button>
      <button class="tb-btn" onclick="addTable()">⊞ 插入新表格</button>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap" style="display:none">
      <div class="preview-paper" id="docPaper"></div>
    </div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script src="_shared/layout.js"></script>
<script>
CRM.mountSidebar('documents');
const token = CRM.getToken();

const cfg = JSON.parse(localStorage.getItem('crm_settings') || '{}');
const CO_NAME = cfg.company || 'Wenzhou Hetao Electric Co., Ltd.';
const CO_ADDR = cfg.address || 'Room 301, Building 3, Ruijinyuan, No. 5555, Central Avenue, Beibai Xiang Town, Yueqing City, Wenzhou City, Zhejiang Province';
const API_BASE = '';

let orders = [];
let customers = [];
let currentLang = 'en';
let editMode = false;

// i18n
const i18n = {
  en: {
    navMain:'MENU', navDashboard:'Dashboard', navOrders:'Orders', navDocuments:'Documents',
    pageTitle:'Documents', ctrlTitle:'Generate Document',
    lblOrder:'Order', lblDocType:'Document Type', lblDocLang:'Language',
    btnGenerate:'Generate', btnEdit:'Edit', btnDownload:'Download PDF', btnAddRow:'+ Add Row'
  },
  zh: {
    navMain:'菜单', navDashboard:'仪表盘', navOrders:'订单管理', navDocuments:'文件制作',
    pageTitle:'文件制作', ctrlTitle:'生成文件',
    lblOrder:'选择订单', lblDocType:'文件类型', lblDocLang:'语言',
    btnGenerate:'生成', btnEdit:'编辑', btnDownload:'下载 PDF', btnAddRow:'+ 添加行'
  }
};

function toggleLang() {
  currentLang = currentLang === 'en' ? 'zh' : 'en';
  document.getElementById('langToggle').textContent = currentLang === 'en' ? 'ZH' : 'EN';
  applyI18n();
}

function applyI18n() {
  const dict = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key]) el.textContent = dict[key];
  });
}

// Helpers
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatShippingAddress(raw) {
  if (!raw) return '';
  try {
    const arr = JSON.parse(raw);
    if (Array.isArray(arr)) {
      return arr.map(a => {
        if (typeof a === 'object') return [a.address, a.phone].filter(Boolean).join(', ');
        return String(a);
      }).join(' / ');
    }
  } catch(e) {}
  return String(raw);
}

function today() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function ed(ph='') {
  return `contenteditable="true" data-ph="${esc(ph)}"`;
}

// API
async function apiFetch(url) {
  const res = await fetch(API_BASE + url, { headers: { 'Authorization': 'Bearer ' + token } });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

async function loadOrders() {
  try {
    orders = await apiFetch('/api/orders');
    const sel = document.getElementById('selOrder');
    sel.innerHTML = '<option value="">-- Select Order --</option>';
    orders.forEach(o => {
      sel.innerHTML += `<option value="${o.id}">${esc(o.order_number || o.id)} - ${esc(o.customer_name || '')}</option>`;
    });
  } catch(e) { showToast('Failed to load orders: ' + e.message, 'err'); }
}

async function loadCustomers() {
  try {
    customers = await apiFetch('/api/customers');
  } catch(e) { /* silent */ }
}

function getCustomer(id) {
  return customers.find(c => c.id === id || c.id === Number(id)) || {};
}

// Document generation
async function generateDoc() {
  const orderId = document.getElementById('selOrder').value;
  const docType = document.getElementById('selDocType').value;
  const docLang = document.getElementById('selDocLang').value;

  if (!orderId) { showToast('Please select an order', 'err'); return; }

  const order = orders.find(o => String(o.id) === String(orderId));
  if (!order) { showToast('Order not found', 'err'); return; }

  const customer = getCustomer(order.customer_id);
  let html = '';

  if (docType === 'pi') html = renderPI(order, customer, docLang);
  else if (docType === 'quotation') html = renderQuotation(order, customer, docLang);
  else if (docType === 'packing') html = renderPacking(order, customer, docLang);

  document.getElementById('docPaper').innerHTML = html;
  document.getElementById('previewWrap').style.display = '';
  document.getElementById('tableToolbar').classList.add('show');
  editMode = false;
}
// 按当前文档语言取产品名
function pickName(it, lang) {
  if (lang === 'zh') return it.product_name_cn || it.product_name_en || it.product_name || it.name || '';
  return it.product_name_en || it.product_name_cn || it.product_name || it.name || '';
}

// PI Template
function renderPI(order, customer, lang) {
  const items = order.items || [];
  const addr = formatShippingAddress(order.shipping_address || customer.address);
  const rows = items.map(it => `
    <tr>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">${esc(pickName(it, lang))}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">${it.quantity || ''}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
    </tr>`).join('');
  const emptyRows = items.length < 4 ? Array(4 - items.length).fill(0).map(() => `
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;height:26px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
    </tr>`).join('') : '';

  return `
  <div style="text-align:center;margin-bottom:8px">
    <div style="font-size:22px;font-weight:bold" ${ed('Company Name')}>${esc(CO_NAME)}</div>
    <div style="font-size:10.5px;color:#333;margin-top:3px" ${ed('Address')}>${esc(CO_ADDR)}</div>
  </div>
  <div style="text-align:center;font-size:15px;font-weight:bold;border:1px solid #000;padding:4px 0">Proforma Invoice</div>
  <table style="width:100%;border-collapse:collapse">
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;width:12%;font-weight:600">To:</td>
      <td style="border:1px solid #000;padding:5px 8px;width:40%" ${ed('Customer')}>${esc(customer.name || order.customer_name || '')}</td>
      <td style="border:1px solid #000;padding:5px 8px;width:12%;font-weight:600">DATE:</td>
      <td style="border:1px solid #000;padding:5px 8px" ${ed('Date')}>${today()}</td>
    </tr>
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">ATTN:</td>
      <td style="border:1px solid #000;padding:5px 8px" ${ed('Contact')}>${esc(customer.contact_person || '')}</td>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">Invoice No:</td>
      <td style="border:1px solid #000;padding:5px 8px" ${ed('INV-')}>${esc(order.order_number || '')}</td>
    </tr>
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">Address:</td>
      <td colspan="3" style="border:1px solid #000;padding:5px 8px" ${ed('Address')}>${esc(addr)}</td>
    </tr>
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">Delivery Term:</td>
      <td style="border:1px solid #000;padding:5px 8px" ${ed('FOB/CIF')}>${esc(order.delivery_term || '')}</td>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">Tel:</td>
      <td style="border:1px solid #000;padding:5px 8px" ${ed('Phone')}>${esc(customer.whatsapp || customer.phone || '')}</td>
    </tr>
  </table>
  <table style="width:100%;border-collapse:collapse;margin-top:-1px">
    <thead>
      <tr style="text-align:center;font-weight:bold;background:#f0f0f0">
        <th style="border:1px solid #000;padding:6px;width:30%">Product Name</th>
        <th style="border:1px solid #000;padding:6px;width:12%">Quantity</th>
        <th style="border:1px solid #000;padding:6px;width:14%">Unit Price</th>
        <th style="border:1px solid #000;padding:6px;width:14%">Amount</th>
        <th style="border:1px solid #000;padding:6px;width:10%">HS Code</th>
        <th style="border:1px solid #000;padding:6px;width:10%">Origin</th>
        <th style="border:1px solid #000;padding:6px;width:10%">Remarks</th>
      </tr>
    </thead>
    <tbody id="productTbody">${rows}${emptyRows}</tbody>
    <tfoot>
      <tr style="font-weight:bold">
        <td style="border:1px solid #000;padding:6px;text-align:right">TOTAL:</td>
        <td style="border:1px solid #000;padding:6px" contenteditable="true">&nbsp;</td>
        <td style="border:1px solid #000;padding:6px" contenteditable="true">&nbsp;</td>
        <td style="border:1px solid #000;padding:6px" contenteditable="true">&nbsp;</td>
        <td style="border:1px solid #000;padding:6px" contenteditable="true">&nbsp;</td>
        <td style="border:1px solid #000;padding:6px" contenteditable="true">&nbsp;</td>
        <td style="border:1px solid #000;padding:6px" contenteditable="true">&nbsp;</td>
      </tr>
    </tfoot>
  </table>`;
}
// Quotation Template
function renderQuotation(order, customer, lang) {
  const items = order.items || [];
  let subtotal = 0;
  const rows = items.map((it, i) => {
    const price = Number(it.sales_price || it.unit_price || 0);
    const qty = Number(it.quantity || 0);
    const amt = Number(it.sales_total || (qty * price));
    subtotal += amt;
    return `
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">${i+1}</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">${esc(pickName(it, lang))}</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">${esc(it.specification || it.spec || it.description || '')}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">${qty || ''}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:right" contenteditable="true">${price ? '$' + price.toFixed(2) : ''}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:right" contenteditable="true">${amt ? '$' + amt.toFixed(2) : ''}</td>
    </tr>`;
  }).join('');
  const emptyRows = items.length < 4 ? Array(4 - items.length).fill(0).map(() => `
    <tr>
      <td style="border:1px solid #000;padding:5px 8px;height:26px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">&nbsp;</td>
    </tr>`).join('') : '';
  const shipping = Number(order.shipping_cost || 0);
  const total = subtotal + shipping;

  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <div style="font-size:24px;font-weight:bold;color:#000">QUOTATION</div>
      <div style="font-size:11px;color:#555;margin-top:4px" ${ed('Date')}>${today()}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:14px;font-weight:bold" ${ed('Company')}>${esc(CO_NAME)}</div>
      <div style="font-size:10px;color:#555;margin-top:2px;max-width:280px" ${ed('Address')}>${esc(CO_ADDR)}</div>
    </div>
  </div>
  <div style="margin-bottom:14px;padding:10px;background:#f9f9f9;border:1px solid #ddd;border-radius:4px">
    <div style="font-size:11px;color:#666;font-weight:600;margin-bottom:4px">BILL TO:</div>
    <div style="font-size:13px;font-weight:600" ${ed('Customer')}>${esc(customer.name || order.customer_name || '')}</div>
    <div style="font-size:11px;color:#444;margin-top:2px" ${ed('Address')}>${esc(formatShippingAddress(order.shipping_address || customer.address))}</div>
  </div>
  <table style="width:100%;border-collapse:collapse">
    <thead>
      <tr style="text-align:center;font-weight:bold;background:#f0f0f0">
        <th style="border:1px solid #000;padding:6px;width:6%">#</th>
        <th style="border:1px solid #000;padding:6px;width:28%">Description</th>
        <th style="border:1px solid #000;padding:6px;width:18%">Spec</th>
        <th style="border:1px solid #000;padding:6px;width:10%">Qty</th>
        <th style="border:1px solid #000;padding:6px;width:16%">Unit Price</th>
        <th style="border:1px solid #000;padding:6px;width:16%">Amount</th>
      </tr>
    </thead>
    <tbody>${rows}${emptyRows}</tbody>
    <tfoot>
      <tr>
        <td colspan="4" style="border:none"></td>
        <td style="border:1px solid #000;padding:6px;font-weight:600;text-align:right">Subtotal:</td>
        <td style="border:1px solid #000;padding:6px;text-align:right" contenteditable="true">$${subtotal.toFixed(2)}</td>
      </tr>
      <tr>
        <td colspan="4" style="border:none"></td>
        <td style="border:1px solid #000;padding:6px;font-weight:600;text-align:right">Shipping:</td>
        <td style="border:1px solid #000;padding:6px;text-align:right" contenteditable="true">$${shipping.toFixed(2)}</td>
      </tr>
      <tr>
        <td colspan="4" style="border:none"></td>
        <td style="border:1px solid #000;padding:6px;font-weight:bold;text-align:right;background:#f4b942">TOTAL:</td>
        <td style="border:1px solid #000;padding:6px;font-weight:bold;text-align:right;background:#f4b942" contenteditable="true">$${total.toFixed(2)}</td>
      </tr>
    </tfoot>
  </table>
  <div style="margin-top:14px;padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:11px;color:#555">
    <div style="font-weight:600;margin-bottom:4px">Remarks:</div>
    <div ${ed('Add remarks...')}>${esc(order.remarks || order.notes || '')}&nbsp;</div>
  </div>`;
}
// Packing List Template
function renderPacking(order, customer, lang) {
  const items = order.items || [];
  const addr = formatShippingAddress(order.shipping_address || customer.address);
  const rows = items.map(it => `
    <tr>
      <td style="border:1px solid #000;padding:5px 8px" contenteditable="true">${esc(pickName(it, lang))}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">${it.quantity || ''}</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td style="border:1px solid #000;padding:5px 8px;text-align:center" contenteditable="true">&nbsp;</td>
      <td class="del-col"><button class="del-row-btn" onclick="this.closest('tr').remove()">x</button></td>
    </tr>`).join('');
  const emptyRows = items.length < 4 ? Array(4 - items.length).fill(0).map(() => `
    <tr>

    <tr>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">ATTN:</td>
      <td style="border:1px solid #000;padding:5px 8px" ${ed('Contact')}>${esc(customer.contact_person || '')}</td>
      <td style="border:1px solid #000;padding:5px 8px;font-weight:600">Invoice No:</td>

// Actions
function toggleEdit() {
  editMode = !editMode;
  const paper = document.getElementById('docPaper');
  const cells = paper.querySelectorAll('td, th');
  cells.forEach(c => c.contentEditable = editMode ? 'true' : 'false');
  document.getElementById('btnEdit').textContent = editMode
    ? (currentLang === 'zh' ? '✅ 完成编辑' : '✅ Done')
    : (currentLang === 'zh' ? '✏ 编辑模式' : '✏ Edit');
}

function addRow() {
  const tbody = document.getElementById('productTbody');
  if (!tbody) return;
  const firstRow = tbody.querySelector('tr');
  const cols = firstRow ? firstRow.cells.length : 7;
  const tr = document.createElement('tr');
  tr.innerHTML = Array(cols).fill(0).map(() =>
    `<td style="border:1px solid #000;padding:5px 8px;height:26px" contenteditable="true">&nbsp;</td>`
  ).join('');
  tbody.appendChild(tr);
}

// ── 获取当前选中的单元格 ──
function getActiveCell() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  let node = sel.anchorNode;
  while (node && node.tagName !== 'TD' && node.tagName !== 'TH') node = node.parentElement;
  if (!node) return null;
  const paper = document.getElementById('docPaper');
  if (!paper.contains(node)) return null;
  return node;
}

function getActiveRow() {
  const cell = getActiveCell();
  return cell ? cell.closest('tr') : null;
}

function getActiveTable() {
  const cell = getActiveCell();
  return cell ? cell.closest('table') : null;
}

// ── 行操作 ──
function insertRowAbove() {
  const row = getActiveRow();
  if (!row) return showToast(currentLang==='zh'?'请先点击表格中的单元格':'Click a cell first','err');
  const newRow = row.cloneNode(true);
  newRow.querySelectorAll('td,th').forEach(c => { c.textContent = ''; c.contentEditable = 'true'; });
  row.parentNode.insertBefore(newRow, row);
}

function insertRowBelow() {
  const row = getActiveRow();
  if (!row) return showToast(currentLang==='zh'?'请先点击表格中的单元格':'Click a cell first','err');
  const newRow = row.cloneNode(true);
  newRow.querySelectorAll('td,th').forEach(c => { c.textContent = ''; c.contentEditable = 'true'; });
  row.parentNode.insertBefore(newRow, row.nextSibling);
}

function deleteRow() {
  const row = getActiveRow();
  if (!row) return showToast(currentLang==='zh'?'请先点击表格中的单元格':'Click a cell first','err');
  row.remove();
}

// ── 列操作 ──
function getCellIndex(cell) {
  let idx = 0;
  let prev = cell.previousElementSibling;
  while (prev) { idx += (prev.colSpan || 1); prev = prev.previousElementSibling; }
  return idx;
}

function insertColLeft() {
  const cell = getActiveCell();
  if (!cell) return showToast(currentLang==='zh'?'请先点击单元格':'Click a cell first','err');
  const table = cell.closest('table');
  const colIdx = getCellIndex(cell);
  table.querySelectorAll('tr').forEach(tr => {
    let cumIdx = 0;
    for (const c of tr.cells) {
      if (cumIdx === colIdx) {
        const td = document.createElement(c.tagName.toLowerCase() === 'th' ? 'th' : 'td');
        td.style.cssText = 'border:1px solid #000;padding:5px 8px';
        td.contentEditable = 'true';
        td.innerHTML = '&nbsp;';
        tr.insertBefore(td, c);
        break;
      }
      cumIdx += (c.colSpan || 1);
      if (cumIdx > colIdx) break;
    }
  });
}

function insertColRight() {
  const cell = getActiveCell();
  if (!cell) return showToast(currentLang==='zh'?'请先点击单元格':'Click a cell first','err');
  const table = cell.closest('table');
  const colIdx = getCellIndex(cell) + (cell.colSpan || 1);
  table.querySelectorAll('tr').forEach(tr => {
    let cumIdx = 0;
    let inserted = false;
    for (const c of tr.cells) {
      cumIdx += (c.colSpan || 1);
      if (cumIdx === colIdx) {
        const td = document.createElement(c.tagName.toLowerCase() === 'th' ? 'th' : 'td');
        td.style.cssText = 'border:1px solid #000;padding:5px 8px';
        td.contentEditable = 'true';
        td.innerHTML = '&nbsp;';
        tr.insertBefore(td, c.nextSibling);
        inserted = true;
        break;
      }
    }
    if (!inserted) {
      const td = document.createElement('td');
      td.style.cssText = 'border:1px solid #000;padding:5px 8px';
      td.contentEditable = 'true';
      td.innerHTML = '&nbsp;';
      tr.appendChild(td);
    }
  });
}

function deleteCol() {
  const cell = getActiveCell();
  if (!cell) return showToast(currentLang==='zh'?'请先点击单元格':'Click a cell first','err');
  const table = cell.closest('table');
  const colIdx = getCellIndex(cell);
  table.querySelectorAll('tr').forEach(tr => {
    let cumIdx = 0;
    for (const c of [...tr.cells]) {
      if (cumIdx === colIdx) { c.remove(); break; }
      cumIdx += (c.colSpan || 1);
      if (cumIdx > colIdx) break;
    }
  });
}

// ── 合并/拆分 ──
// Shift+点击 多选单元格
function setupCellSelection() {
  const paper = document.getElementById('docPaper');
  paper.addEventListener('mousedown', (e) => {
    const cell = e.target.closest('td, th');
    if (!cell || !paper.contains(cell)) return;
    if (e.shiftKey) {
      e.preventDefault();
      cell.classList.toggle('cell-selected');
    } else {
      // 普通点击清除多选高亮（但保留焦点编辑）
      paper.querySelectorAll('.cell-selected').forEach(c => c.classList.remove('cell-selected'));
    }
  });
}

function clearSelection() {
  document.querySelectorAll('#docPaper .cell-selected').forEach(c => c.classList.remove('cell-selected'));
}

function mergeCells() {
  const paper = document.getElementById('docPaper');
  const selected = [...paper.querySelectorAll('.cell-selected')];
  if (selected.length < 2) {
    return showToast(currentLang==='zh'?'请按住 Shift 点击至少 2 个单元格':'Shift+click at least 2 cells','err');
  }
  // 必须同行
  const row = selected[0].parentElement;
  if (!selected.every(c => c.parentElement === row)) {
    return showToast(currentLang==='zh'?'仅支持同一行单元格合并':'Only same-row merge supported','err');
  }
  // 按 DOM 顺序排序
  selected.sort((a,b) => {
    const cs = [...row.children];
    return cs.indexOf(a) - cs.indexOf(b);
  });
  // 必须连续
  const cells = [...row.children];
  const idxs = selected.map(c => cells.indexOf(c));
  for (let i = 1; i < idxs.length; i++) {
    if (idxs[i] !== idxs[i-1] + 1) {
      return showToast(currentLang==='zh'?'选中的单元格必须相邻':'Selected cells must be adjacent','err');
    }
  }
  // 合并：内容拼接 + 累加 colSpan
  const first = selected[0];
  let totalSpan = 0;
  let combined = '';
  selected.forEach(c => {
    totalSpan += (c.colSpan || 1);
    const txt = c.innerHTML.replace(/&nbsp;/g,'').trim();
    if (txt) combined += (combined ? ' ' : '') + txt;
  });
  first.colSpan = totalSpan;
  first.innerHTML = combined || '&nbsp;';
  selected.slice(1).forEach(c => c.remove());
  first.classList.remove('cell-selected');
  showToast(currentLang==='zh'?`已合并 ${selected.length} 个单元格`:`Merged ${selected.length} cells`,'ok');
}

function splitCell() {
  const cell = getActiveCell() || document.querySelector('#docPaper .cell-selected');
  if (!cell) return showToast(currentLang==='zh'?'请先点击要拆分的单元格':'Click a merged cell','err');
  const span = cell.colSpan || 1;
  if (span <= 1) return showToast(currentLang==='zh'?'该单元格未合并':'Cell is not merged','err');
  cell.colSpan = 1;
  for (let i = 1; i < span; i++) {
    const td = document.createElement(cell.tagName.toLowerCase());
    td.style.cssText = 'border:1px solid #000;padding:5px 8px';
    td.contentEditable = 'true';
    td.innerHTML = '&nbsp;';
    cell.parentNode.insertBefore(td, cell.nextSibling);
  }
  showToast(currentLang==='zh'?'已拆分':'Split','ok');
}

function clearCell() {
  const cell = getActiveCell();
  if (!cell) return showToast(currentLang==='zh'?'请先点击单元格':'Click a cell first','err');
  cell.innerHTML = '&nbsp;';
}

function addTable() {
  const paper = document.getElementById('docPaper');
  const rows = parseInt(prompt(currentLang==='zh'?'行数：':'Rows:','3'))||3;
  const cols = parseInt(prompt(currentLang==='zh'?'列数：':'Columns:','4'))||4;
  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;margin-top:12px';
  for (let r = 0; r < rows; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < cols; c++) {
      const td = document.createElement('td');
      td.style.cssText = 'border:1px solid #000;padding:5px 8px';
      td.contentEditable = 'true';
      td.innerHTML = '&nbsp;';
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  paper.appendChild(table);
}

async function downloadPDF() {
  const el = document.getElementById('docPaper');
  if (!el.innerHTML.trim()) { showToast('No document to download', 'err'); return; }

  const docType = document.getElementById('selDocType').value;
  const names = { pi: 'Proforma-Invoice', quotation: 'Quotation', packing: 'Packing-List' };
  const filename = (names[docType] || 'Document') + '-' + today().replace(/\./g, '-');

  // Hide delete buttons for PDF
  const delCols = el.querySelectorAll('.del-col');
  delCols.forEach(t => { t._bk = t.style.display; t.style.display = 'none'; });

  try {
    await html2pdf().set({
      margin: [8, 8, 8, 8],
      filename: filename + '.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(el).save();
    showToast(currentLang === 'zh' ? 'PDF 已下载' : 'PDF downloaded', 'ok');
  } catch(e) {
    showToast('Download failed: ' + e.message, 'err');
  } finally {
    delCols.forEach(t => { t.style.display = t._bk || ''; });
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.className = 'toast', 2500);
}

// Quick Export: auto-generate if URL has ?order=ID&type=pi
function checkQuickExport() {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order');
  const docType = params.get('type');
  if (orderId && docType) {
    document.getElementById('selOrder').value = orderId;
    document.getElementById('selDocType').value = docType;
    setTimeout(() => generateDoc(), 300);
  }
}

// Init
(async function init() {
  await Promise.all([loadOrders(), loadCustomers()]);
  applyI18n();
  setupCellSelection();
  checkQuickExport();
})();
